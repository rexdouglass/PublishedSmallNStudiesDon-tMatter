schema_version: 0.1.0
generated_by: scripts/build_individual_replication_search_strategy.py
strategy_id: figure1_individual_replication_paper_level_search
updated: '2026-05-05'
goal: Find individual paper-to-paper replication, validation, retest, or larger follow-up
  pairs after corpus/database saturation.
non_goals:
- Do not harvest broad replication corpora as final rows in this lane.
- Do not count ordinary citations as replication relation evidence.
- Do not promote same-data reanalyses or computational-only reproductions as independent-sample
  Figure 1 rows.
unit_of_work:
  grain: original_work x replication_work x original_study_result x replication_study_result
    x outcome x contrast_timepoint x aggregation_level
  required_identity_parts:
  - original_work
  - replication_work
  - original_study_result
  - replication_study_result
  - outcome
  - contrast_timepoint
  - aggregation_level
  pair_key_components:
  - normalized_original_work_id
  - normalized_replication_work_id
  - original_study_label
  - replication_study_label
  - outcome_label
  - contrast_label
  - timepoint_label
  - aggregation_level
core_pipeline:
- order: 1
  step: raw_hit
  exit_artifact: raw/{surface}/{query_id}.jsonl
- order: 2
  step: candidate_replication_or_followup_paper
  exit_artifact: works/work_identity.jsonl
- order: 3
  step: resolved_original_target
  exit_artifact: pairs/candidate_pairs.jsonl
- order: 4
  step: paper_pair_candidate
  exit_artifact: pairs/screening_queue.tsv
- order: 5
  step: study_outcome_level_pair
  exit_artifact: individualrepsearch-*.json
- order: 6
  step: value_extraction
  exit_artifact: individual-paper-value-scan-batch001.tsv
- order: 7
  step: routing_label
  exit_artifact: individual-paper-worklist-*.tsv or rejection ledger
search_surfaces:
