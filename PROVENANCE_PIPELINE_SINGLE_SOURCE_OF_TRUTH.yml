        - source_artifact
      output_node_types:
        - source_artifact
        - source_file
        - strategy_attempt
        - manual_task
      applies_when: >
        A CORPORA_AND_DATABASES.tsv row has a current plot role but the local
        artifact that actually catalogs the corpus result rows for that plot
        universe has not been identified, mirrored, sampled, or queued.
      stop_conditions:
        - Every plot-scoped corpus/source-family row is classified as local_result_artifact_candidate_present, local_mirror_needs_result_artifact_identification, needs_result_bearing_artifact_on_disk, blocked_access, duplicate_not_primary, rejected_not_current_plot, or manual_required.
        - Every local candidate has a SOURCE_ARTIFACTS-shaped row with local path, checksum when practical, candidate parser family, and result-field evidence or an explicit no-result-artifact finding.
        - Every nonlocal candidate has a route-specific acquisition attempt or manual task for OSF, Dataverse, Zenodo, Figshare, Dryad, GitHub/GitLab, article supplement/PDF, API snapshot, website mirror, author/library route, or no-lawful-access blocker.
