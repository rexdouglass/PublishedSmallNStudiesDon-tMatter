# Goal:
#   Build a reproducible, extensible provenance pipeline for the small-N /
#   effect-inflation plots, starting with Figure 1. The pipeline searches the
#   world for replication corpora, databases, repositories, and individual
#   replication sources; preserves every lead without over-promoting it; routes
#   each item through deterministic DAG steps; uses YAML and target files as
#   the single source of truth; and spends Codex/GPT/human judgment only where
#   automation cannot decide. The end state is not just finding more datasets:
#   any plotted result should be traceable from search strategy, through leads
#   and source-family inventories, to mirrored artifacts, extracted
#   original/replication pairs, verified effect/N values, and auditable
#   inclusion/exclusion decisions.

PROVENANCE_PIPELINE_SINGLE_SOURCE_OF_TRUTH:
  schema_version: 0.1.0
  name: evidence_provenance_pipeline
  updated: "2026-05-05"
  status: draft_registry
  
  purpose: >
    Human- and LLM-editable graph registry for the evidence provenance
    pipeline. This file describes target universes, node types, edge types,
    stages, strategy contracts, queues, and promotion gates. It is a registry
    and documentation source, not yet the execution scheduler.
  
  principles:
    - id: search_is_provenance
      text: >
        Universe search is part of provenance. Search spaces, queries, seed
        inventories, rejected leads, and promotion decisions should be recorded
        before locating or acquisition strategies run.
    - id: leads_before_location
      text: >
        A possible corpus, paper, registry entry, repository, or project should
        first become a typed search lead. It should not enter locating or source
        acquisition until it passes a universe-specific lead-to-target gate.
    - id: typed_targets
      text: >
        Treat result targets, represented sources, and evidence objects as
        different node types. A strategy that discovers one type should not
        silently promote another type.
    - id: append_only_attempts
      text: >
        Search, acquisition, rejection, and manual-access events are evidence.
        Preserve attempts and decisions instead of overwriting earlier state.
    - id: source_text_first
      text: >
        Preserve verbatim source text or source fields before parsing cleaned
        numeric values.
    - id: identity_before_acquisition
      text: >
        Identity-blocked rows need crosswalk or bibliographic repair before more
        download attempts.
    - id: strict_level5
      text: >
        Metadata pages, abstracts, paywalls, CAPTCHA pages, and access-denied
        pages are acquisition evidence, but they are not level-5 source objects
        unless they actually contain the plotted value.
    - id: result_artifact_before_parsing
      text: >
        Plot-scoped corpus/source-family rows do not advance to result parsing
        because a lead exists. They advance only after the result-bearing
        artifact is local or explicitly queued for acquisition: database export,
        repository data file, workbook, source table, code output, PDF
        supplement, article PDF/HTML/XML containing the relevant stats, API
        snapshot, archive member, or mirrored website page that catalogs the
        source results.
    - id: zotero_is_capture_not_authority
      text: >
        Zotero can help discover and capture files, but accepted evidence comes
        only after local hashing, identity review, and source_file/source_access
        promotion.
    - id: catalog_everything_but_focus_current_figures
      text: >
        Do not discard leads, sources, candidates, sidecars, comparators, or
        excluded rows. Catalog and enumerate them with status and reason, while
        keeping active build focus on the three current figures.
    - id: rejected_for_one_use_is_not_rejected_globally
      text: >
        A source, corpus, dataset, paper, or row that fails a primary plot gate
        can still be useful for a different diagnostic, sensitivity panel,
        source-object denominator, or repair worklist. Record the failed gate
        and route it to the most specific alternate use rather than collapsing
        it to a generic rejection.
  
  current_figure_focus:
    active_figures:
      - figure_number: 1
        plot_universe_id: plot1_replication_pairs
        role: current_figure
        plain_english: Larger-N replication or follow-up results paired to their original results.
      - figure_number: 2
        plot_universe_id: plot2_published_paper_d_vs_n
        role: current_figure
        plain_english: Eventually published paper/result endpoints with recoverable D/N.
      - figure_number: 3
        plot_universe_id: plot3_preregistered_results
        role: current_figure
        plain_english: Eventually published preregistered, registered, PAP, or planned results with recoverable D/N.
    catalog_only_universes:
      - plot1b_clinical_binary_d_equivalent
      - plot1c_native_effect_retention
      - plot1d_source_object_coverage_denominator
      - plot4_all_source_dn_dump
    catalog_policy:
      - Every discovered lead should be represented as a typed search lead, source row, candidate row, manual task, or explicit rejection.
      - Excluded, comparator, sidecar, duplicate, metadata-only, and not-yet-parseable sources stay in catalogs with a reason; they are not deleted.
      - Future plot ideas should consume cataloged sources later instead of changing the admission rules for the three active figures now.
      - Alternate routes are context-specific memberships. Rejecting a row from Figure 1A does not delete it and does not prevent it from landing in a Figure 1B D-equivalent panel, native-scale appendix, coverage denominator, missing-N repair queue, or all-source dump.
      - The all-source D/N dump is a diagnostic catalog and future-plot seed, not an active fourth figure for the current scope.
  
  database_schema_contract:
    purpose: >
      Keep the database adaptable as we test different plot universes and later
      define new figures. Durable facts about sources, files, mappings, and
      result assertions are stored once. Plot-specific choices are stored as
      context-scoped memberships and decisions, so a future plot can use
      different criteria without rewriting or deleting the underlying evidence.
    operating_rules:
      - >
        Search leads are not sources yet. A lead is a possible corpus,
        database, project, registry record, paper, replication paper, or file
        discovered under a search context.
      - >
        Sources are citeable or computational objects. Corpora, databases,
        papers, registries, repositories, packages, PDFs, raw files, and derived
        tables can all be sources.
      - >
        Source relationships are first-class rows. Use mappings for corpus
        contains paper, database reports result, registry links publication,
        preregistration supports study, replication of, and repository supports
        paper.
      - >
        Source results are assertions at the lowest useful result grain. A
        source_result row says one extraction source exposed one result about
        one represented source.
      - >
        Canonical results resolve duplicates or collapse child rows, but they
        should not decide whether a row belongs to a particular figure.
      - >
        Plot membership is the context layer. The same canonical result can be
        included, excluded, diagnostic-only, or sensitivity-only under different
        plot_universe criteria.
      - >
        Failed, excluded, duplicate, sidecar, comparator, and catalog-only rows
        remain in the database with status and reasons. Plot exclusion is never
        deletion.
    table_layers:
      - id: search_context
        context_sensitivity: context_scoped
        tables:
          - table: search_lead.tsv
            grain: One discovered lead under one search track or universe.
            role: >
              Captures corpus/database/project leads and individual
              replication-paper leads before they become sources or result rows.
          - table: provenance_search_plan.tsv
            grain: One search track for one plot universe.
            role: Generated plan from this YAML; documents tools, seed queries, accept/reject rules, and outputs.
      - id: source_catalog
        context_sensitivity: mostly_context_free
        tables:
          - table: source.tsv
            grain: One citeable or computational source object.
            role: Stores papers, corpora, databases, registries, repositories, files, reports, and derived tables.
          - table: source_identifier.tsv
            grain: One external identifier for one source.
            role: Stores DOI, PMID, PMCID, NCT, AEA, OSF, Dataverse, OpenAlex, URL, and related identifiers.
          - table: source_classification.tsv
            grain: One classification assertion for one source.
            role: Stores field, source family, study design, publication type, venue, and other source labels with provenance.
      - id: access_and_files
        context_sensitivity: context_free_attempt_log
        tables:
          - table: source_access.tsv
            grain: One usable or documented access route for one source.
            role: Stores URL/API/local-path/checksum/access route facts.
          - table: source_access_attempt.tsv
            grain: One attempted resolver, route, query, download, browser, or file action.
            role: Append-only route history including blockers, metadata-only results, and rejected candidates.
          - table: source_file.tsv
            grain: One mirrored byte artifact or extracted archive member.
            role: Stores content-addressed PDFs, XML, HTML, registry JSON, datasets, code, supplements, screenshots, and archives.
          - table: source_version.tsv
            grain: One version assertion for one source.
            role: Distinguishes VOR, accepted manuscript, preprint, registry update, dataset version, code version, and metadata.
          - table: source_access_right.tsv
            grain: One rights or storage decision for one source/file.
            role: Stores license, TDM, robots, mirroring, text extraction, redistribution, and institutional-access decisions.
      - id: relationship_graph
        context_sensitivity: reusable_evidence
        tables:
          - table: source_source_mapping.tsv
            grain: One directed relationship between two sources.
            role: >
              Stores corpus membership, database assertions, preregistration,
              registered-report, publication-link, repository-support,
              replication, reproduction, robustness, duplicate, and parent-child
              relationships.
      - id: result_assertions
        context_sensitivity: reusable_evidence
        tables:
          - table: source_result.tsv
            grain: One result asserted or exposed by one extraction source.
            role: Stores verbatim source text, native parsed values, standardized values, selector state, relationship IDs, and evidence level.
          - table: source_result_support.tsv
            grain: One field-level support locator for one source-result decision.
            role: Stores effect text, N text, selector text, conversion inputs, raw data, code, and recomputed-output support.
      - id: canonicalization
        context_sensitivity: reusable_with_policy_id
        tables:
          - table: canonical_result.tsv
            grain: One deduplicated or policy-collapsed result.
            role: Stores preferred result, child count, D/N summaries, and aggregation rule without making final plot inclusion decisions.
          - table: canonical_result_membership.tsv
            grain: One source-result member of one canonical result.
            role: Stores child/preferred/duplicate/sensitivity membership and collapse contribution.
      - id: plot_context
        context_sensitivity: context_scoped
        tables:
          - table: plot_universe.tsv
            grain: One reusable plot or statistic-set context.
            role: Snapshots plot definitions from this YAML when a build needs a table artifact.
          - table: plot_criterion.tsv
            grain: One reusable inclusion, exclusion, or context criterion.
            role: Snapshots reusable criteria such as ever-published, explicit replication pair, D/N available, and prereg selector.
          - table: plot_membership.tsv
            grain: One canonical result evaluated under one plot universe.
            role: Stores included/excluded/catalog-only/sensitivity decisions, passed/failed criteria, display fields, and plot statistics inclusion.
      - id: work_audit
        context_sensitivity: append_only_or_queue
        tables:
          - table: extraction_event.tsv
            grain: One action or failed action.
            role: Stores downloads, API calls, parsing, manual checks, code execution, and blockers.
          - table: extraction_problem.tsv
            grain: One quality/provenance problem.
            role: Stores missing evidence, ambiguous mappings, access blockers, conversion problems, and rework needs.
          - table: manual_acquisition_task.tsv
            grain: One human/manual acquisition or verification task.
            role: Stores library, author, browser, Zotero, rights, identity, source-object, and value-verification tasks.
    sample_300_lessons:
      - >
        The corpus/paper/result split is right, but it needs a search-lead layer
        above it so corpus databases and individual replication papers can enter
        the pipeline before we know whether they produce usable result rows.
      - >
        The same real-world source can play multiple roles: a corpus can be an
        extraction source, a paper can be a represented source, a registry can be
        both source object and preregistration mapping, and a repository can be
        relationship evidence plus bytes.
      - >
        Plot criteria should be versioned context decisions. Figure 1, Figure 2,
        Figure 3, diagnostics, and future plots should reuse the same source and
        result rows while changing only plot_universe, plot_criterion, and
        plot_membership decisions.
    consolidation_priority:
      - table: CORPORA_AND_DATABASES.tsv
        schema: CORPORA_AND_DATABASES_SCHEMA.yml
        grain: One discovered corpus, database, source-family lead, registry database, replication project, source table, or repository package.
        rule: >
          This is the first consolidated intake table. Any corpus/database-like
          source we discover goes here before it is split into source,
          source_access, source_file, source_result, mapping, or plot-membership
          detail rows.
        status: active_first_consolidated_table
      - table: FIGURE1_REPLICATION_PAIRS.tsv
        schema: FIGURE1_REPLICATION_PAIRS_SCHEMA.yml
        grain: One original/replication result pair with D and N on both sides.
        rule: >
          This is the first consolidated pair-result table for Figure 1. Any
          corpus row that passes the D/N check enters here before it is split
          into side-level source_result, source_result_support, canonical_result,
          and plot_membership detail rows. Rows that fail current plot gates are
          retained with blockers instead of deleted.
        status: active_first_pair_result_table
  
  plot_universe_criteria:
    - id: source_family_recorded
      gate_type: required_context
      rule: >
        Candidate source rows must carry a canonical source family or source
        key so inclusion, exclusion, comparator, and duplicate decisions are
        auditable at source-family grain.
      evidence_fields:
        - source_family
        - source_key
        - display_label
        - citation_key
    - id: candidate_artifact_or_backing_file_recorded
      gate_type: required_context
      rule: >
        The source table, package, workbook, registry export, article, or other
        artifact that exposed the candidate rows must be named by path or URL.
      evidence_fields:
        - backing_file
        - backing_path
        - raw_file
        - candidate_artifact_path_or_url
    - id: local_result_bearing_corpus_artifact_recorded
      gate_type: required_before_corpus_result_extraction
      applies_to_grain: corpus_database_or_source_family
      rule: >
        A plot-scoped corpus/source-family row is not ready for result
        extraction until at least one local artifact actually catalogs the
        result rows relevant to that plot. A landing page, bibliographic record,
        DOI resolver page, project description, search hit, or metadata-only
        manifest is not enough. The local artifact can be a database export,
        row-level table, workbook, repository data file, generated code output,
        archive member, PDF supplement, full article PDF/HTML/XML containing
        the source table, API JSON snapshot, registry export, or mirrored
        website page with the row-level result catalog.
      acceptable_artifact_classes:
        - database_export
        - corpus_csv_tsv_or_json
        - workbook_or_spreadsheet
        - repository_data_file
        - generated_code_output_table
        - archive_member_with_rows
        - article_or_supplement_pdf_containing_result_catalog
        - full_article_html_or_xml_containing_result_catalog
        - api_snapshot_json
        - registry_export
        - mirrored_website_result_catalog
      reject_if_only:
        - source_family_landing_page
        - DOI_or_bibliographic_metadata
        - abstract_or_publisher_landing_page
        - file_inventory_without_downloadable_or_mirrored_result_object
        - README_or_methods_description_without_rows
        - code_without_input_data_or_generated_result_table
      evidence_fields:
        - source_artifact_local_path
        - source_artifact_sha256
        - source_artifact_sample_path
        - result_field_evidence
        - pair_field_evidence
        - n_field_evidence
        - effect_field_evidence
    - id: represented_result_ever_published
      gate_type: include_if_true
      applies_to_grain: represented_result
      rule: >
        The represented result, outcome, claim, trial result, paper result, or
        project-level planned result has evidence of a citable published report
        of that same result at some point in the world. The plotted value does
        not have to be extracted from the publication itself; it may come from a
        registry record, PAP package, corpus workbook, project table, or source
        data if the row-level result can be linked to a published report.
      accept_if:
        - A DOI, PMID, PMCID, publisher URL, Crossref/OpenAlex work, or stable journal article citation is linked to the represented result.
        - A registry record, NCT/AEA/OSF/EGAP/PAP entry, or project package links to a publication and the registered/planned outcome maps to the plotted result.
        - A corpus row supplies article DOI/title/journal/year evidence and the result row is one of the corpus-coded published results.
        - A publication exists for the project and the source table records the plotted row as that publication's planned, primary, focal, matched, or confirmatory result.
      reject_if:
        - The only publication is about the corpus, dataset, registry snapshot, or extraction method rather than the represented result.
        - The only evidence is a registration, PAP, project page, repository package, dataset DOI, conference abstract, or metadata record with no published result report.
        - A paper exists for the study or trial but the plotted outcome/result cannot be mapped to a result reported in that paper.
        - The publication link is only a loose topic/title similarity with no trial ID, DOI, PMID, registry reference, outcome match, or corpus crosswalk.
      status_values:
        - result_report_published
        - publication_linked_result_match_uncertain
        - publication_exists_but_result_not_mapped
        - dataset_or_corpus_publication_only
        - preprint_only
        - no_publication_found
        - not_checked
      evidence_fields:
        - publication_link_status
        - published_report_identifier_type
        - published_report_identifier_value
        - published_report_doi
        - published_report_pmid
        - published_report_pmcid
        - published_report_url
        - article_title
        - journal
        - publication_year
        - nct_id
        - registry_id
        - publication_link_plausibility
        - publication_match_quality
        - result_publication_match_basis
    - id: result_effect_convertible_to_common_d_axis
      gate_type: include_if_true
      rule: >
        The candidate row exposes D directly, a common D/Z-compatible effect, or
        deterministic conversion inputs that the local parser maps to the common
        D-like axis.
      evidence_fields:
        - D
        - D_median
        - original_d
        - replication_d
        - native_statistic_type
        - conversion_formula_id
    - id: comparative_binary_d_equivalent_supported
      gate_type: alternate_route_if_true
      reusable_in_plot_universe_ids:
        - plot1b_clinical_binary_d_equivalent
        - plot4_all_source_dn_dump
      rule: >
        A row that is not admitted to the strict direct-D panel can still enter
        a D-equivalent diagnostic panel when it exposes a comparative binary
        treatment effect or all deterministic inputs needed to construct one.
        Preferred inputs are active/control event counts and arm Ns on both the
        original and replication/follow-up sides. Odds ratios or log odds ratios
        may be converted using log(OR) * sqrt(3) / pi. Risk ratios or risk
        differences require the corresponding baseline/control risk before the
        OR-to-D-equivalent conversion. Hazard-ratio-only rows require fixed-time
        event/survival risks or another documented policy before they can enter
        this route.
      accept_if:
        - original and follow-up sides both expose active/control responder or event counts plus arm Ns
        - original and follow-up sides both expose OR/logOR and N
        - RR/RD rows expose a baseline/control risk source for both sides
        - HR rows expose fixed-time event or survival probabilities sufficient to derive a risk/odds contrast
      reject_if:
        - one-arm response rate or objective response rate has no comparator or defensible reference rate
        - treatment-arm-only response rates lack matched control-arm information
        - HR-only rows lack fixed-time event or survival information
        - the source exposes only a success/failure label or qualitative replication outcome
      evidence_fields:
        - effect_metric_raw
        - effect_family
        - original_event_count
        - original_control_event_count
        - original_arm_n
        - original_control_n
        - replication_event_count
        - replication_control_event_count
        - replication_arm_n
        - replication_control_n
        - odds_ratio
        - log_odds_ratio
        - risk_ratio
        - risk_difference
        - baseline_risk_used
        - baseline_risk_source
        - time_horizon
        - d_equivalent
        - d_equivalent_method
        - d_equivalent_tier
        - conversion_warning
    - id: native_effect_pair_retained_without_common_d_axis
      gate_type: alternate_route_if_true
      reusable_in_plot_universe_ids:
        - plot1c_native_effect_retention
        - plot1d_source_object_coverage_denominator
      rule: >
        A row can be retained for a native-scale diagnostic when it has a
        mapped original/follow-up pair and native values with N on both sides,
        but no defensible conversion to the common D axis. Examples include
        one-arm ORR, treatment-arm-only response rates, native logits of single
        proportions, benchmark metrics, and other source-specific effect scales.
      accept_if:
        - original and follow-up native effect values are copied or parsed
        - original and follow-up Ns are copied or parsed
        - the native metric and row grain are recorded
        - the row is explicitly marked as not comparable to Figure 1A D
      reject_if:
        - the source has only narrative text with no row-level native values
        - native values are not paired to an identifiable original/follow-up relation
      evidence_fields:
        - native_effect_metric
        - native_effect_original
        - native_effect_replication
        - original_N
        - replication_N
        - effect_metric_raw
        - effect_family
        - is_comparative_effect
        - is_single_arm
        - conversion_warning
    - id: source_object_pair_roster_retained_without_values
      gate_type: alternate_route_if_true
      reusable_in_plot_universe_ids:
        - plot1d_source_object_coverage_denominator
      rule: >
        A source object can be retained in the source-object coverage
        denominator when it identifies original/follow-up pairs or source-family
        rows, even if public bytes do not expose effect and N values. These rows
        should not enter a quantitative scatter but are useful for estimating
        the amount of the universe that is discovered but not value-bearing.
      accept_if:
        - source object names original and follow-up papers/studies/trials or a corpus-defined pair ID
        - source object is locally mirrored or the access barrier is explicitly recorded
        - missing value fields and acquisition state are recorded
      reject_if:
        - the object is only a topic, search hit, marketing page, or bibliographic citation with no pair/row mapping
      evidence_fields:
        - pair_id
        - original_source_hint
        - replication_source_hint
        - source_artifact_local_path
        - target_acquisition_state
        - value_verification_state
        - missing_fields
        - access_barrier
    - id: effect_present_but_n_missing_repair_route
      gate_type: alternate_route_if_true
      reusable_in_plot_universe_ids:
        - plot1d_source_object_coverage_denominator
      rule: >
        A source that exposes original/follow-up effect estimates but no N fields
        should be routed to a missing-N repair worklist rather than being
        globally rejected. It remains out of D/N figures until N can be acquired
        from a lawful source object, supplement, registry, report, or author
        route.
      accept_if:
        - original and follow-up effect estimates or native effect values are present
        - N is absent, ambiguous, restricted, or only recoverable from another source object
        - the candidate repair route is recorded
      evidence_fields:
        - effect_metric_raw
        - original_effect_text
        - replication_effect_text
        - missing_fields
        - candidate_n_source_url
        - candidate_n_source_local_path
        - repair_route_status
        - next_action
    - id: result_n_available
      gate_type: include_if_true
      rule: >
        The candidate row exposes analytic N, arm/group Ns, enrollment N accepted
        by that plot policy, or deterministic fields from which the plotted N is
        derived.
      evidence_fields:
        - N
        - N_median
        - original_N
        - replication_N
        - group1_n
        - group2_n
        - enrollment
    - id: positive_d_and_n
      gate_type: include_if_true
      rule: >
        The plotted or diagnostic D/N surface requires positive D and positive N
        after the source-specific parser and row policy are applied.
      evidence_fields:
        - D
        - D_median
        - N
        - N_median
    - id: paper_or_study_unit_identified
      gate_type: include_if_true
      rule: >
        The candidate can be grouped to a paper, study, trial, registry record,
        project, or corpus-defined paper/study unit before plotting.
      evidence_fields:
        - unit_id
        - paper_id
        - doi
        - nct_id
        - registry_id
        - represented_source_id
    - id: one_row_per_paper_or_policy_collapse
      gate_type: include_if_true
      rule: >
        If a source can emit multiple rows per paper, project, trial, or source
        unit, the plot has an explicit collapse or selection policy before the
        row enters the plotted layer.
      evidence_fields:
        - collapse_unit
        - rows_with_implemented_paper_collapse
        - rows_currently_plotted
        - plot_rows_made_in
    - id: selector_status_recorded
      gate_type: required_context
      rule: >
        The source must explicitly record whether the row is a main, focal,
        primary, planned, matched, critical, treatment-arm, comparator, random,
        or unknown-selector row. Unknown selector status is allowed only when the
        plot labels it as a caveat rather than treating it as main-result
        evidence.
      evidence_fields:
        - main_selector_status
        - rows_with_explicit_main_selector
        - selector_evidence_type
        - status_label
        - why_in_out
    - id: explicit_original_followup_pair_mapping
      gate_type: include_if_true
      rule: >
        Plot 1 rows must link one original-side result to one replication,
        follow-up, repeated-study, pilot/full-scale, or otherwise larger-N
        follow-up-side result.
      evidence_fields:
        - original_source_hint
        - replication_source_hint
        - relationship_mapping_basis
        - source_mapping_ids
    - id: both_sides_n_at_least_10
      gate_type: include_if_true
      rule: >
        Plot 1 keeps only paired rows where original-side N and replication-side
        N are both at least 10 after rows missing D/Z or N have already failed.
      evidence_fields:
        - original_N
        - replication_N
        - blocked_N_lt_10
    - id: followup_n_greater_than_original_n
      gate_type: include_if_true
      rule: >
        Plot 1 keeps only paired rows where the replication/follow-up N is
        strictly larger than the original N.
      evidence_fields:
        - original_N
        - replication_N
        - blocked_replication_N_le_original_N
    - id: aggregate_only_without_row_level_result_excluded
      gate_type: exclude_if_true
      rule: >
        Aggregate-only summaries, reviews, or narrative descriptions are out
        when no row-level result or deterministic row-level reconstruction is
        available.
      evidence_fields:
        - excluded_reason_code
        - blocker_codes
        - why_in_out
    - id: published_paper_scope_not_registry_only
      gate_type: include_if_true
      rule: >
        Plot 2 rows must be published-paper endpoints or paper-linked published
        source estimates. Registry-only, GWAS-catalog-only, and raw
        registry-result surfaces are comparators unless they are explicitly
        bridged to a journal-side paper endpoint.
      evidence_fields:
        - published_scope
        - rows_with_direct_journal_provenance
        - plot_inclusion_status
        - why_in_out
    - id: not_all_tests_without_selector_or_collapse
      gate_type: exclude_if_true
      rule: >
        All-test corpora are out of Plot 2 unless the current build has an
        implemented paper/result collapse or a defensible focal-result selector.
        This is why row-level test surfaces such as statcheck remain out even
        when D/N is technically recoverable.
      evidence_fields:
        - known_test_rows
        - rows_with_implemented_paper_collapse
        - rows_with_explicit_main_selector
        - status_label
    - id: comparator_only_excluded_from_primary_plot
      gate_type: exclude_if_true
      rule: >
        Comparator-only, random-effect, negative-claim, registry-only, sidecar,
        or sensitivity rows are excluded from a primary plot universe unless
        that universe is explicitly the all-source diagnostic dump.
      evidence_fields:
        - comparator_only
        - plot_inclusion_status
        - inclusion_role
        - why_in_out
    - id: explicit_preregistered_confirmatory_selector
      gate_type: include_if_true
      rule: >
        Plot 3 rows must be analytically preregistered, registered-primary,
        matched to a preregistered hypothesis, PAP-governed, registered-report
        confirmatory, or otherwise preregistered-confirmatory equivalent.
      evidence_fields:
        - rows_preregistered_equivalent
        - preregistration_timing_status
        - selector_evidence_type
        - prereg_mapping_id
    - id: public_local_backing_for_prereg_row
      gate_type: include_if_true
      rule: >
        Plot 3 rows must have public or locally mirrored backing for the
        registration, source table, package, workbook, registry export, or
        article-level result assertion used by the parser.
      evidence_fields:
        - rows_with_public_local_backing
        - backing_file
        - source_file_id
    - id: non_retracted_source
      gate_type: include_if_true
      rule: >
        Plot 3 excludes rows whose represented source is retracted or otherwise
        marked as not admissible under the current non-retraction policy.
      evidence_fields:
        - rows_with_non_retracted_source
        - retraction_status
        - why_in_out
    - id: planned_result_median_collapse_allowed
      gate_type: include_if_true
      rule: >
        Plot 3 may include multiple planned or matched preregistered results
        from the same paper/project only after applying the current median
        collapse policy at the declared paper/project unit.
      evidence_fields:
        - collapse_unit
        - rows_left_out_within_source
        - plot_rows_made_in
    - id: duplicate_nested_or_sidecar_evidence_excluded
      gate_type: exclude_if_true
      rule: >
        Rows are out of a primary plot when they duplicate a stricter source,
        are nested inside an already-counted parent source, or are retained only
        as sidecar/comparator evidence.
      evidence_fields:
        - duplicate_status
        - source_mapping_ids
        - plot_inclusion_status
        - why_in_out
    - id: diagnostic_source_family_role_recorded
      gate_type: include_if_true
      rule: >
        Plot 4 requires every source family to record whether it is included,
        included as sidecar, not included because already folded into another
        source, or retained only as comparator/exclusion context.
      evidence_fields:
        - plot_inclusion_status
        - inclusion_rule
        - remaining_caveat
    - id: not_duplicate_of_parent_dump_source
      gate_type: exclude_if_true
      rule: >
        Plot 4 does not separately load rows from a child artifact when those
        rows are already folded into a parent dump source, because that would
        double-count the same D/N surface.
      evidence_fields:
        - plot_inclusion_status
        - inclusion_rule
        - remaining_caveat
    - id: staged_sidecar_rows_have_positive_side_dn
      gate_type: include_if_true
      rule: >
        Plot 4 may include non-promoted staged sidecar rows only when the staged
        artifact already exposes a positive D and N for that side.
      evidence_fields:
        - D
        - N
        - source_side
        - inclusion_rule
    - id: metadata_or_narrative_only_excluded
      gate_type: exclude_if_true
      rule: >
        Metadata records, abstracts, landing pages, narrative reviews, access
        pages, and citation-only leads are out unless the plotted value itself
        is present or a downstream source-object route emits value-bearing rows.
      evidence_fields:
        - source_byte_class
        - barrier_class
        - candidate_status
        - rejection_reason
  
  plot_universes:
    - id: plot1_replication_pairs
      current_scope_role: current_figure
      figure_label: Figure 1
      result_target_kind: replication_pair_result
      eligibility:
        publication_requirement: not_required
        search_direction: replication_first_then_resolve_original
        search_policy: >
          Figure 1 search should start from replication, follow-up,
          repeated-study, pilot/full-scale, and coordinated replication sources.
          Do not begin by enumerating ordinary original articles and hoping to
          find later replications. Once a replication/follow-up lead is found,
          resolve both sides of the pair: the replication/follow-up result and
          the original result it targets.
        publication_policy: >
          Figure 1 is about paired original and replication/follow-up results.
          It does not require the represented result to have ever been published,
          because valid pair evidence can come from replication projects,
          source tables, project packages, or coordinated follow-up datasets.
        output_unit: >
          One original-side result paired to one larger-N replication or
          follow-up-side result. Approved Appendix D fallback rows can enter
          only if already plot-ready under the same D/N policy.
        include_when_all:
          - source_family_recorded
          - candidate_artifact_or_backing_file_recorded
          - local_result_bearing_corpus_artifact_recorded
          - explicit_original_followup_pair_mapping
          - result_effect_convertible_to_common_d_axis
          - result_n_available
          - both_sides_n_at_least_10
          - followup_n_greater_than_original_n
        exclude_when_any:
          - aggregate_only_without_row_level_result_excluded
          - metadata_or_narrative_only_excluded
        source_table_gate_columns:
          - kept_for_figure
          - blocked_no_DZ
          - blocked_no_N
          - blocked_N_lt_10
          - blocked_replication_N_le_original_N
      represented_source_kinds:
        - original_study
        - replication_study
        - replication_project
      evidence_object_kinds:
        - article_fulltext
        - replication_project_table
        - replication_package_code
        - preregistration_or_protocol
      notes: >
        Dots are paired original/replication results. Relationship edges are
        first-class and should not be reduced to boolean replication flags. The
        discovery direction is replication-first because a valid replication
        implies an original target that can then be resolved.
    - id: plot2_published_paper_d_vs_n
      current_scope_role: current_figure
      figure_label: Figure 2
      result_target_kind: published_paper_result_or_paper_median
      eligibility:
        publication_requirement: required
        publication_criterion_id: represented_result_ever_published
        publication_policy: >
          Figure 2 requires the represented result to have a citable published
          report. The plotted D/N may come from a corpus, source table, or
          conversion pipeline, but the row must be linked to a published paper
          or published paper-level result rather than only to a registry,
          dataset, repository, or extraction-method publication.
        output_unit: >
          One published-paper or corpus-defined paper/study unit after the
          source-specific paper collapse or focal-result rule is applied.
        include_when_all:
          - source_family_recorded
          - candidate_artifact_or_backing_file_recorded
          - local_result_bearing_corpus_artifact_recorded
          - represented_result_ever_published
          - published_paper_scope_not_registry_only
          - paper_or_study_unit_identified
          - result_effect_convertible_to_common_d_axis
          - result_n_available
          - one_row_per_paper_or_policy_collapse
          - selector_status_recorded
        exclude_when_any:
          - not_all_tests_without_selector_or_collapse
          - comparator_only_excluded_from_primary_plot
          - metadata_or_narrative_only_excluded
        allowed_with_caveat:
          - selector_status_recorded
        source_table_gate_columns:
          - known_paper_units
          - known_test_rows
          - rows_with_direct_journal_provenance
          - publication_link_status
          - result_publication_match_basis
          - rows_with_paper_grouping
          - rows_with_paper_level_dn
          - rows_with_explicit_main_selector
          - rows_with_implemented_paper_collapse
          - rows_currently_plotted
      represented_source_kinds:
        - journal_article
        - article_level_corpus_source
      evidence_object_kinds:
        - article_fulltext
        - corpus_workbook_row
        - supplement
        - raw_or_analytic_data
      notes: >
        This universe includes paper-like rows, Metabus shorthand citations, and
        corpus assertions about published papers.
    - id: plot3_preregistered_results
      current_scope_role: current_figure
      figure_label: Figure 3
      result_target_kind: preregistered_or_registry_result
      eligibility:
        publication_requirement: required
        publication_criterion_id: represented_result_ever_published
        publication_policy: >
          Figure 3 requires the represented preregistered or registered result
          to have eventually been reported in a citable publication. The
          publication does not have to be the source object for the plotted D/N;
          a registry, PAP package, OSF workbook, Dataverse package, or project
          table can still supply the value if the represented result is mapped
          to a published report.
        output_unit: >
          One preregistered-confirmatory result, registered primary result, or
          declared paper/project median over explicitly matched planned results.
        include_when_all:
          - source_family_recorded
          - candidate_artifact_or_backing_file_recorded
          - local_result_bearing_corpus_artifact_recorded
          - represented_result_ever_published
          - explicit_preregistered_confirmatory_selector
          - public_local_backing_for_prereg_row
          - paper_or_study_unit_identified
          - result_effect_convertible_to_common_d_axis
          - result_n_available
          - non_retracted_source
          - one_row_per_paper_or_policy_collapse
        include_when_applicable:
          - planned_result_median_collapse_allowed
        exclude_when_any:
          - comparator_only_excluded_from_primary_plot
          - duplicate_nested_or_sidecar_evidence_excluded
          - metadata_or_narrative_only_excluded
        source_table_gate_columns:
          - rows_considered
          - rows_preregistered_equivalent
          - rows_with_public_local_backing
          - publication_link_status
          - published_report_identifier_value
          - result_publication_match_basis
          - rows_with_extractable_DN
          - rows_with_non_retracted_source
          - rows_currently_included
      represented_source_kinds:
        - registered_trial
        - preregistered_study
        - paper_with_preregistration
        - pap_or_registry_record
      evidence_object_kinds:
        - registry_json
        - registry_html
        - pre_analysis_plan
        - article_fulltext
        - result_table
      notes: >
        Selector evidence matters here: preregistration, PAP, registered report,
        registry outcome, or corpus focal-result rules must be explicit.
    - id: plot1b_clinical_binary_d_equivalent
      current_scope_role: diagnostic_panel_candidate
      figure_label: Figure 1B candidate
      result_target_kind: replication_pair_result_d_equivalent
      eligibility:
        publication_requirement: mixed
        publication_policy: >
          Figure 1B is a diagnostic companion to strict Figure 1A. It preserves
          the original/follow-up pairing goal but admits comparative binary and
          clinical endpoints only when a documented D-equivalent conversion is
          supported by source fields. It does not relax provenance; it changes
          only the effect-scale route.
        output_unit: >
          One original-side comparative binary or clinical result paired to one
          replication/follow-up-side result, with D-equivalent values and
          conversion tier recorded.
        include_when_all:
          - source_family_recorded
          - candidate_artifact_or_backing_file_recorded
          - local_result_bearing_corpus_artifact_recorded
          - explicit_original_followup_pair_mapping
          - comparative_binary_d_equivalent_supported
          - result_n_available
          - both_sides_n_at_least_10
          - followup_n_greater_than_original_n
        exclude_when_any:
          - aggregate_only_without_row_level_result_excluded
          - metadata_or_narrative_only_excluded
        source_table_gate_columns:
          - effect_metric_raw
          - effect_family
          - d_equivalent
          - d_equivalent_method
          - d_equivalent_tier
          - baseline_risk_used
          - baseline_risk_source
          - time_horizon
          - is_comparative_effect
          - is_single_arm
          - conversion_warning
          - rows_currently_plotted
      represented_source_kinds:
        - original_study
        - replication_study
        - clinical_trial
        - followup_study
      evidence_object_kinds:
        - article_fulltext
        - source_table
        - supplement
        - registry_json
        - dataset
        - code_output
      notes: >
        This route is for defensible D-equivalent rows such as OR/logOR and
        baseline-aware RR/RD conversions. One-arm ORR and treatment-arm-only
        response rates do not enter this panel; route them to native retention.
    - id: plot1c_native_effect_retention
      current_scope_role: diagnostic_or_supplement
      figure_label: Figure 1 native-scale appendix
      result_target_kind: replication_pair_native_effect
      eligibility:
        publication_requirement: mixed
        publication_policy: >
          Native-effect retention preserves rows that are relevant to original
          versus follow-up signal shrinkage but cannot be fairly placed on the
          common D or D-equivalent axis. This route is explicitly not evidence
          for the main D scatter.
        output_unit: >
          One original/follow-up paired row with native effect values and Ns on
          both sides, retaining the native metric and warnings.
        include_when_all:
          - source_family_recorded
          - candidate_artifact_or_backing_file_recorded
          - local_result_bearing_corpus_artifact_recorded
          - explicit_original_followup_pair_mapping
          - native_effect_pair_retained_without_common_d_axis
          - result_n_available
        exclude_when_any:
          - aggregate_only_without_row_level_result_excluded
          - metadata_or_narrative_only_excluded
        source_table_gate_columns:
          - native_effect_metric
          - native_effect_original
          - native_effect_replication
          - original_N
          - replication_N
          - effect_family
          - is_comparative_effect
          - is_single_arm
          - conversion_warning
      represented_source_kinds:
        - original_study
        - replication_study
        - followup_study
      evidence_object_kinds:
        - source_table
        - supplement
        - registry_json
        - dataset
        - code_output
      notes: >
        This route captures one-arm ORR, treatment-arm-only response rates, and
        similar native metrics so they are visible without being mislabeled as D.
    - id: plot1d_source_object_coverage_denominator
      current_scope_role: diagnostic_denominator
      figure_label: Figure 1 coverage denominator
      result_target_kind: source_object_or_row_coverage_record
      eligibility:
        publication_requirement: mixed
        publication_policy: >
          The coverage denominator records what we have actually found and
          mirrored or attempted, including strict D/N rows, blocked D/N rows,
          D-equivalent candidates, native-effect rows, roster-only pairs, and
          effect-without-N rows. It is not a quantitative effect plot.
        output_unit: >
          One local row-grain source object, pair roster row, result row, or
          missing-field repair candidate.
        include_when_all:
          - source_family_recorded
          - candidate_artifact_or_backing_file_recorded
        include_when_any:
          - result_effect_convertible_to_common_d_axis
          - comparative_binary_d_equivalent_supported
          - native_effect_pair_retained_without_common_d_axis
          - source_object_pair_roster_retained_without_values
          - effect_present_but_n_missing_repair_route
        exclude_when_any:
          - metadata_or_narrative_only_excluded
        source_table_gate_columns:
          - diagnostic_bucket
          - target_acquisition_state
          - value_verification_state
          - missing_fields
          - access_barrier
          - route_to_next_use
          - route_payload
      represented_source_kinds:
        - any_source_family
        - original_followup_pair_roster
        - result_table_row
        - acquisition_attempt
      evidence_object_kinds:
        - source_table
        - source_access_attempt
        - source_file
        - report_or_roster
      notes: >
        This universe is the place to answer coverage questions such as "what
        percent of the local row universe is strict Figure 1-ready?" It should
        not be used to backfill Figure 1A without passing the stricter gates.
    - id: plot4_all_source_dn_dump
      current_scope_role: catalog_only_future_plot_seed
      figure_label: not_current_figure
      result_target_kind: source_dump_result
      eligibility:
        publication_requirement: mixed
        publication_policy: >
          The all-source D/N dump is a diagnostic catalog, not an active current
          figure. It should preserve whether each source family is published,
          unpublished, registry-only, package-backed, sidecar, comparator, or
          already folded into another source, but publication is not a universal
          admission gate.
        output_unit: >
          One diagnostic D/N row from any source family, including original and
          follow-up sides from replication pairs, published-paper paper units,
          preregistered rows, and explicitly admitted sidecar rows.
        include_when_all:
          - source_family_recorded
          - candidate_artifact_or_backing_file_recorded
          - local_result_bearing_corpus_artifact_recorded
          - positive_d_and_n
          - diagnostic_source_family_role_recorded
        include_when_applicable:
          - staged_sidecar_rows_have_positive_side_dn
        exclude_when_any:
          - not_duplicate_of_parent_dump_source
          - metadata_or_narrative_only_excluded
        source_table_gate_columns:
          - rows_available
          - rows_in_dump
          - inclusion_rule
          - remaining_caveat
      represented_source_kinds:
        - any_source_family
      evidence_object_kinds:
        - source_dump_row
        - registry_record
        - article_fulltext
        - dataset
        - code_output
      notes: >
        This is the broadest diagnostic universe and should expose provenance
        level, source family, and inclusion status rather than hiding uncertainty.

  alternate_plot_routes:
    purpose: >
      Preserve useful source objects and rows after a primary plot rejection.
      A rejection from Figure 1A is a context decision, not a global deletion.
      Downstream scripts and review cues should choose the most specific
      alternate route that the source can support.
    default_policy:
      - Record the failed primary gate, route decision, and route payload in machine-readable fields.
      - Prefer value-bearing diagnostic routes over context-only routes when source bytes support them.
      - Do not relax Figure 1A criteria by routing a row to an alternate panel; alternate routes get separate plot_universe IDs.
      - Do not route request-only datasets into quantitative panels until public or user-provided bytes are mirrored and parsed.
    routes:
      - id: figure1a_reject_to_figure1b_d_equivalent
        rejected_from_plot_universe_id: plot1_replication_pairs
        route_to_plot_universe_id: plot1b_clinical_binary_d_equivalent
        route_when_primary_blockers_include:
          - not_direct_D_axis
          - native_binary_comparative_effect
          - conversion_inputs_available_but_not_strict_d
        route_if_all:
          - explicit_original_followup_pair_mapping
          - comparative_binary_d_equivalent_supported
          - result_n_available
        route_payload_fields:
          - conversion_route_status
          - effect_metric_raw
          - d_equivalent_method
          - d_equivalent_tier
          - baseline_risk_used
          - baseline_risk_source
          - time_horizon
          - conversion_warning
      - id: figure1a_reject_to_native_effect_retention
        rejected_from_plot_universe_id: plot1_replication_pairs
        route_to_plot_universe_id: plot1c_native_effect_retention
        route_when_primary_blockers_include:
          - one_arm_or_treatment_arm_only_response
          - native_metric_not_comparable_to_d
          - benchmark_metric_no_d_conversion
        route_if_all:
          - explicit_original_followup_pair_mapping
          - native_effect_pair_retained_without_common_d_axis
          - result_n_available
        route_payload_fields:
          - native_metric_status
          - native_effect_metric
          - native_effect_original
          - native_effect_replication
          - is_comparative_effect
          - is_single_arm
          - conversion_warning
      - id: figure1a_reject_to_coverage_denominator_roster
        rejected_from_plot_universe_id: plot1_replication_pairs
        route_to_plot_universe_id: plot1d_source_object_coverage_denominator
        route_when_primary_blockers_include:
          - roster_only
          - public_source_object_has_pair_mapping_but_no_values
          - request_only_values_not_obtained
          - metadata_only_after_value_search
        route_if_any:
          - source_object_pair_roster_retained_without_values
          - effect_present_but_n_missing_repair_route
        route_payload_fields:
          - coverage_status
          - target_acquisition_state
          - value_verification_state
          - missing_fields
          - access_barrier
          - next_action
      - id: figure1a_reject_to_missing_n_repair
        rejected_from_plot_universe_id: plot1_replication_pairs
        route_to_worklist_id: missing_n_or_value_repair_worklist
        also_catalog_under_plot_universe_id: plot1d_source_object_coverage_denominator
        route_when_primary_blockers_include:
          - effect_present_no_n
          - n_missing_from_public_result_file
          - n_requires_other_source_object
        route_if_all:
          - effect_present_but_n_missing_repair_route
        route_payload_fields:
          - missing_fields
          - candidate_n_source_url
          - candidate_n_source_local_path
          - repair_route_status
          - next_action
  
  node_types:
    - id: plot_universe
      description: Plot-specific domain of eligible result targets.
      canonical_tables:
        - plot_universe.tsv
        - plot_criterion.tsv
        - plot_membership.tsv
    - id: search_space
      description: Corpus, index, registry, repository class, local inventory, or literature domain searched for possible result targets.
      canonical_tables:
        - provenance_search_plan.tsv
        - extraction_event.tsv
    - id: search_query
      description: Exact query, API call, local inventory scan, or manual review operation used to search a universe.
      canonical_tables:
        - provenance_search_plan.tsv
        - source_access_attempt.tsv
        - extraction_event.tsv
    - id: search_lead
      description: Possible source, corpus, registry record, project, paper, or result table found before it becomes a result target.
      canonical_tables:
        - search_lead.tsv
        - provenance_search_plan.tsv
        - manual_acquisition_task.tsv
    - id: result_target
      description: A candidate or plotted D/N result before deduplication.
      canonical_tables:
        - source_result.tsv
    - id: canonical_result
      description: Deduplicated or collapsed plotted result.
      canonical_tables:
        - canonical_result.tsv
        - canonical_result_membership.tsv
    - id: extraction_source
      description: Source object that directly asserted or exposed a result row.
      canonical_tables:
        - source.tsv
        - source_result.tsv
    - id: represented_source
      description: Paper, registry record, study, dataset, or package the result is about.
      canonical_tables:
        - source.tsv
        - source_identifier.tsv
    - id: source_identifier
      description: DOI, PMID, PMCID, NCT, AEA, OpenAlex, Crossref, OSF, Dataverse, or stable URL identity.
      canonical_tables:
        - source_identifier.tsv
    - id: source_mapping
      description: Relationship between sources, such as corpus contains paper or registry preregisters trial.
      canonical_tables:
        - source_source_mapping.tsv
    - id: access_route
      description: A route to source bytes or metadata.
      canonical_tables:
        - source_access.tsv
    - id: strategy_attempt
      description: One attempt by one resolver, search, API, browser, or file route.
      canonical_tables:
        - source_access_attempt.tsv
        - extraction_event.tsv
    - id: source_object_candidate
      description: Candidate byte object or metadata record before acceptance.
      canonical_tables:
        - source_object_candidate.tsv
        - source_access_attempt.tsv
    - id: corpus_database
      description: Corpus, database, source-family package, registry export, or repository collection before row-level extraction.
      canonical_tables:
        - CORPORA_AND_DATABASES.tsv
        - source.tsv
        - source_source_mapping.tsv
    - id: source_artifact
      description: Candidate or mirrored artifact that may contain result-bearing bytes for a source family.
      canonical_tables:
        - source_artifacts_proposal.tsv
        - source_file.tsv
        - source_access.tsv
    - id: source_file
      description: Content-addressed mirrored artifact.
      canonical_tables:
        - source_file.tsv
    - id: source_result_support
      description: Field-level evidence snippet, locator, conversion input, raw data, code, or recomputed output.
      canonical_tables:
        - source_result_support.tsv
    - id: manual_task
      description: Human follow-up item for identity, acquisition, rights, or value verification.
      canonical_tables:
        - manual_acquisition_task.tsv
    - id: review_queue
      description: Bounded Codex, GPT, or human review cue for ambiguous leads after deterministic routing.
      canonical_tables:
        - reviewcue-queue-*.json
        - reviewcue-*-prompt.md
    - id: promotion_event
      description: Explicit state transition such as L2 to L4, L4 to L5, or L5 to L6.
      canonical_tables:
        - extraction_event.tsv
  
  edge_types:
    - id: defines_search_space
      from: plot_universe
      to: search_space
      meaning: Plot universe declares a searchable domain or seed inventory.
    - id: issues_search_query
      from: search_space
      to: search_query
      meaning: Search space is explored by one exact query, API call, local scan, or manual review operation.
    - id: returns_search_lead
      from: search_query
      to: search_lead
      meaning: Search operation yields a possible corpus, source, project, paper, registry record, or result table.
    - id: triages_lead_to_target
      from: search_lead
      to: result_target
      meaning: Lead passes a universe-specific gate and emits one or more result targets.
    - id: samples
      from: plot_universe
      to: result_target
      meaning: Plot/sample universe includes this result target.
    - id: asserts_result
      from: extraction_source
      to: result_target
      meaning: Extraction source directly asserts or exposes this result.
    - id: canonicalizes
      from: canonical_result
      to: result_target
      meaning: Canonical result chooses, collapses, or groups source-result rows.
    - id: represents
      from: result_target
      to: represented_source
      meaning: Result target is about this paper, registry record, trial, or dataset.
    - id: identifies
      from: represented_source
      to: source_identifier
      meaning: Identifier grounds a represented source in the wider world.
    - id: maps_to
      from: extraction_source
      to: represented_source
      meaning: Crosswalk or relationship mapping connects a corpus/source row to a represented source.
    - id: proposes_route
      from: represented_source
      to: access_route
      meaning: Resolver or human process proposes a route to metadata or bytes.
    - id: attempts_route
      from: access_route
      to: strategy_attempt
      meaning: One concrete request, query, browser action, local check, or file action was attempted.
    - id: produces_candidate
      from: strategy_attempt
      to: source_object_candidate
      meaning: Attempt yielded a candidate object, metadata record, or blocker artifact.
    - id: accepts_candidate_as_file
      from: source_object_candidate
      to: source_file
      meaning: Candidate passed identity and byte-class gates and was mirrored.
    - id: mirrors_source
      from: source_file
      to: represented_source
      meaning: Mirrored bytes are a value-bearing source object for the represented source.
    - id: supports_field
      from: source_file
      to: source_result_support
      meaning: Mirrored object contains a field-level support snippet or conversion input.
    - id: verifies_result
      from: source_result_support
      to: result_target
      meaning: Support verifies D, N, native value, selector, relationship, or conversion input.
    - id: blocks_to_manual_task
      from: strategy_attempt
      to: manual_task
      meaning: Failed or blocked attempt creates a human follow-up.
    - id: promotes_state
      from: promotion_event
      to: result_target
      meaning: Explicit event changes evidence level or acquisition/verification state.
  
  stages:
    - id: universe_search
      rank: 5
      question: Where do possible result targets for this universe come from?
      primary_output_nodes:
        - search_space
        - search_query
        - search_lead
    - id: universe_definition
      rank: 10
      question: What candidate rows belong to this plot or sample?
      primary_output_nodes:
        - plot_universe
        - result_target
        - canonical_result
    - id: retrace_assertion
      rank: 20
      question: Where did the current plotted number come from?
      primary_output_nodes:
        - extraction_source
        - result_target
    - id: identity_resolution
      rank: 30
      question: What real-world represented source is the result about?
      primary_output_nodes:
        - represented_source
        - source_identifier
        - source_mapping
    - id: locating
      rank: 40
      question: Where might source bytes or authoritative records be found?
      primary_output_nodes:
        - access_route
        - source_object_candidate
    - id: obtaining
      rank: 50
      question: Can we lawfully obtain and mirror value-bearing bytes?
      primary_output_nodes:
        - source_file
        - source_access
        - source_access_attempt
    - id: confirmation
      rank: 60
      question: Is this candidate the right represented source and an eligible byte class?
      primary_output_nodes:
        - source_file
        - promotion_event
    - id: extraction
      rank: 70
      question: Where are exact effect, N, selector, or conversion-input fields inside the source object?
      primary_output_nodes:
        - source_result_support
    - id: verification
      rank: 80
      question: Do source text, fields, data, or code verify the plotted D/N?
      primary_output_nodes:
        - source_result_support
        - promotion_event
    - id: manual_followup
      rank: 90
      question: What requires human access, author contact, library access, rights review, or identity review?
      primary_output_nodes:
        - manual_task
  
  evidence_ladder:
    - level: 0
      name: unanchored_number
      minimum_state: unanchored
    - level: 1
      name: internal_trace_only
      minimum_state: internal_trace
    - level: 2
      name: external_source_assertion
      minimum_state: external_assertion_only
    - level: 3
      name: external_assertion_with_target_source
      minimum_state: target_identity_known
    - level: 4
      name: target_source_independently_grounded
      minimum_state: target_located
    - level: 5
      name: original_source_obtained
      minimum_state: source_object_mirrored
    - level: 6
      name: original_number_extracted
      minimum_state: text_or_data_extracted
    - level: 7
      name: recomputed_from_raw
      minimum_state: raw_data_or_code_recomputed
  
  state_vocabularies:
    target_acquisition_state:
      - unanchored
      - external_assertion_only
      - target_identity_known
      - target_located
      - source_object_mirrorable
      - source_object_mirrored
      - text_or_data_extracted
    value_verification_state:
      - not_checked
      - corpus_assertion_only
      - source_object_obtained_not_parsed
      - text_or_data_extracted
      - value_bearing_source_text_found
      - d_n_verified_from_source
    search_lead_status:
      - not_started
      - seeded_from_existing_artifact
      - target_manifest_present
      - candidate_found
      - candidate_rejected
      - staged_for_parser
      - promoted_to_result_target
      - blocked_access
      - blocked_no_result_fields
      - blocked_scope_mismatch
      - deprecated_duplicate
  
  lead_types:
    - id: corpus_or_database
      description: Candidate corpus, database, or curated source table that may contain many result rows.
    - id: registry_record
      description: Trial, RCT, preregistration, PAP, or registry entry that may expose one or more eligible results.
    - id: paper_or_article
      description: Individual paper or article that may expose an eligible D/N result.
    - id: individual_replication_paper
      description: >
        Individual paper, preprint, report, or article lead that itself appears
        to be a replication, reproduction, robustness check, extension, or
        explicit follow-up of an identifiable original. A single pilot, trial,
        or paper is not enough merely because a later larger study could exist.
    - id: replication_project
      description: Project or package containing paired original and replication evidence.
    - id: preregistration_or_pap
      description: Registration, pre-analysis plan, registered report protocol, or confirmatory-hypothesis record.
    - id: repository_package
      description: OSF, Dataverse, GitHub, Zenodo, OpenICPSR, figshare, or similar package that may contain data, code, or crosswalks.
    - id: candidate_result_table
      description: Table-like artifact with D, N, native statistics, focal-result labels, or enough conversion inputs.
    - id: raw_data_or_code_package
      description: Mirrored raw data, analysis data, scripts, notebooks, or outputs that may support extraction or recomputation.
    - id: manual_source_suggestion
      description: Human-suggested source or literature lead that has not yet been converted to a structured candidate.
  
  search_tools:
    - id: local_raw_inventory
      tool_class: local_inventory
      description: Enumerate mirrored raw directories and manifests under data/raw.
    - id: local_derived_inventory
      tool_class: local_inventory
      description: Enumerate derived catalogs, worklists, and result tables under data/derived.
    - id: rg_local_repo
      tool_class: local_text_search
      description: Use ripgrep over code, reports, manifests, and mirrored text artifacts.
    - id: crossref_api
      tool_class: bibliographic_api
      description: Bibliographic search and DOI grounding for papers and source corpora.
    - id: openalex_api
      tool_class: bibliographic_api
      description: Bibliographic search, source grouping, and open-location discovery after identity is known.
    - id: pubmed_europepmc
      tool_class: bibliographic_api
      description: Biomedical paper and full-text route discovery.
    - id: clinicaltrials_api_v2
      tool_class: registry_api
      description: ClinicalTrials.gov JSON API for registered trial searches and registry result records.
    - id: aea_rct_registry_csv
      tool_class: registry_snapshot
      description: AEA RCT Registry downloadable or mirrored CSV metadata.
    - id: osf_api
      tool_class: repository_api
      description: OSF project and file inventory for datasets, preregistrations, and crosswalks.
    - id: dataverse_api
      tool_class: repository_api
      description: Dataverse dataset and file search for replication packages and political-science PAP material.
    - id: datacite_api
      tool_class: repository_metadata_api
      description: DataCite DOI metadata search for datasets, research objects, and repository packages.
    - id: zenodo_api
      tool_class: repository_api
      description: Zenodo published-record search and file metadata for research datasets, software, and repository packages.
    - id: figshare_api
      tool_class: repository_api
      description: Figshare public article search and item/file metadata for datasets, filesets, code, and repository packages.
    - id: dryad_api
      tool_class: repository_api
      description: Dryad dataset search and dataset/download metadata for replication-related data packages.
    - id: openaire_scholexplorer_api
      tool_class: link_graph_api
      description: OpenAIRE ScholeXplorer publication-data/software link lookup for known corpus papers and source-family articles.
    - id: semantic_scholar_api
      tool_class: citation_graph_api
      description: Semantic Scholar citation/reference/recommendation expansion around known replication corpus papers.
    - id: repository_registry_search
      tool_class: repository_directory_search
      description: re3data, FAIRsharing, OpenDOAR, and similar directories used only to find field-specific repositories to search next.
    - id: openicpsr_api_or_browser
      tool_class: repository_api_or_manual
      description: OpenICPSR project and file search where API or browser capture is required.
    - id: github_code_search_or_clone
      tool_class: repository_search
      description: GitHub code search or mirrored clone scan for source tables, scripts, and package manifests.
    - id: wayback_cdx
      tool_class: web_archive_api
      description: Internet Archive CDX lookup for historical source objects or missing repository files.
    - id: zotero_desktop
      tool_class: capture_assistant
      description: Zotero translator, connector, and storage re-ingest for discovery and lawful file capture.
    - id: manual_literature_review
      tool_class: human_review
      description: Structured human review of articles, citations, reports, and source suggestions.
    - id: paperclip_hosted_index
      tool_class: full_text_search
      description: Hosted full-text biomedical/preprint search used for targeted source discovery.
  
  universe_search_plans:
    - id: search_plan_plot1_corpora_database_discovery
      universe_id: plot1_replication_pairs
      goal: >
        Find additional corpus, database, repository, registry-database, source
        table, and replication-project sources that may contain larger-N
        replication/follow-up pairs for Figure 1.
      search_direction: corpus_database_first_then_parse_pairs
      result_target_kind: corpus_database_inventory_lead
      output_table: CORPORA_AND_DATABASES.tsv
      output_schema: CORPORA_AND_DATABASES_SCHEMA.yml
      target_file_contract:
        target_root: steps/searches/figure1
        rule: >
          Each concrete new-source search attempt writes one target manifest
          file. The target filename includes the method/surface and search
          terms or scan scope. If that target file already exists, that exact
          search is considered done and should be skipped by default. Rerun
          only when an explicit replace flag is set.
        skip_condition: exact_target_file_exists_and_replace_is_false
        replace_controls:
          cli_flag: --replace
          env_var: REPLACE_SEARCH_TARGETS=1
        consolidation_script: scripts/build_corpora_and_databases_table.py
        consolidation_input_glob: steps/searches/figure1/corporasearch-*.*
        yield_summary_script: scripts/summarize_figure1_search_yield.py
        yield_summary_outputs:
          - steps/searches/figure1/searchyield-figure1-corpusdb-summary.tsv
          - steps/searches/figure1/searchyield-figure1-corpusdb-expanded-new-leads.tsv
          - steps/searches/figure1/searchyield-figure1-corpusdb-summary.md
        target_file_contents: >
          Target files should be TSV/CSV/JSON manifests with enough information
          to update CORPORA_AND_DATABASES.tsv: query or scan scope, candidates
          seen, accepted/rejected/block decisions, created or updated
          corpus_database_id values, blocker codes, and next actions.
        output_flow: >
          Local seed artifacts flow directly up into CORPORA_AND_DATABASES.tsv.
          Concrete new-source searches may also emit corporasearch-* target
          manifests. scripts/build_corpora_and_databases_table.py reads those
          manifests, dedupes them with the local seed rows, preserves existing
          nonblank master-table values by default, fills blanks from new
          evidence, and safely updates CORPORA_AND_DATABASES.tsv. Do not create
          target files that are just mirrors of CORPORA_AND_DATABASES.tsv.
        naming_convention: >
          Use corporasearch-{method-or-surface}-{search-terms-or-scope}.{tsv|csv|json}.
          Keep filenames specific enough that humans can see what was searched
          without opening the file.
        code_convention: >
          Concrete search scripts should read source inputs, check their
          target_file, skip immediately when it exists, and only replace when
          --replace or REPLACE_SEARCH_TARGETS=1 is set. Consolidation scripts
          write the root table directly and should not duplicate it in
          steps/searches.
      intake_rule: >
        Any discovered corpus/database-like source goes into
        CORPORA_AND_DATABASES.tsv before row-level parsing or source-result
        promotion. Include blocked, rejected, duplicate, raw-only, staged,
        integrated, and future-seed sources with status and reason.
      minimum_lead_fields:
        - corpus_database_id
        - name
        - record_kind
        - inventory_status
        - source_family
        - description
        - why_relevant
        - plot_universe_ids
        - current_scope_roles
        - figure1_replication_relevance
        - discovery_source
        - discovery_source_path
        - landing_url
        - raw_url
        - local_raw_paths
        - backing_files
        - expected_rows
        - known_pair_rows
        - result_fields_available
        - has_d_or_convertible_effect
        - has_n
        - has_replication_pair_mapping
        - blocker_codes
        - next_action
      promotion_gate_to_result_target: >
        This plan does not promote directly to result targets. It promotes
        discovered leads only into CORPORA_AND_DATABASES.tsv. A later parser or
        manual triage step promotes a corpus/database row into source,
        source_access, source_file, source_source_mapping, source_result, and
        canonical_result rows only after it exposes pair-level fields or a
        plausible route to reconstruct them.
      search_tracks:
        - id: plot1_corpusdb_local_inventory_refresh
          rank: 1
          lead_type: corpus_or_database
          status: seeded_from_existing_artifact
          tools:
            - local_derived_inventory
            - local_raw_inventory
            - rg_local_repo
          seed_queries:
            - replication source catalog
            - replication lead registry
            - corpus suggestion tracker
            - raw corpus candidates with replication files
            - staged or promoted replication harvest outputs
            - source catalogs mentioning replication, follow-up, reproduction, robustness, pilot, or full-scale
          existing_artifacts:
            - data/derived/effect_inflation_dataset/plot1_replication_source_catalog.csv
            - data/raw/replication_projects/lead_registry.csv
            - data/derived/replication_pairs/replication_source_worklist.csv
            - data/raw/corpus_candidates
            - data/raw/replication_projects
            - reports/corpus_suggestion_tracker.md
            - reports/corpus_candidates/replication_lead_queue.md
          accept_if:
            - source appears to contain multiple studies, papers, claims, trials, replication attempts, or pair rows
            - source may expose original/replication relationship fields, D/N fields, or conversion inputs
            - source has a local path, URL, citation, package, article, or other retrievable lead artifact
          reject_if:
            - individual replication paper only; route to individual replication-paper search instead
            - narrative review with no dataset, appendix, code, workbook, or row-level table
            - duplicate of existing CORPORA_AND_DATABASES.tsv row unless it adds a new artifact or route
          stop_conditions:
            - every local candidate has a row in CORPORA_AND_DATABASES.tsv with status, source path, and next action
            - duplicate source families have a single preferred corpus_database_id and alias notes
          outputs:
            - CORPORA_AND_DATABASES.tsv
        - id: plot1_corpusdb_osf_dataverse_openicpsr_search
          rank: 2
          lead_type: repository_package
          status: target_manifest_present
          tools:
            - osf_api
            - dataverse_api
            - datacite_api
            - github_code_search_or_clone
          seed_queries:
            - '"direct replication" data original replication'
            - '"replication study" "original study" dataset'
            - '"replication project" effect size sample size'
            - '"registered replication report" data'
            - '"Many Labs" replication data'
            - '"Reproducibility Project" coded data'
            - '"pilot" "full-scale" trial effect size'
            - '"original" "replication" "Cohen" "N"'
            - '"replication" "original_N" "replication_N"'
            - '"replication" "effect_size" "sample_size"'
          existing_artifacts: []
          target_glob: steps/searches/figure1/corporasearch-repository-*.*
          target_examples:
            - steps/searches/figure1/corporasearch-repository-osf-dataverse-replication-project-effect-size.json
            - steps/searches/figure1/corporasearch-repository-osf-direct-replication-data-original-replication.json
            - steps/searches/figure1/corporasearch-repository-dataverse-registered-replication-report-data.json
            - steps/searches/figure1/corporasearch-repository-openicpsr-reproducibility-project-coded-data.json
          target_file_policy: skip_if_exists_unless_replace
          accept_if:
            - repository contains a table, workbook, code output, or package with multiple original/replication rows
            - file inventory suggests fields for original source, replication source, effect, N, p-value, standard error, or outcome
            - package has enough documentation to classify the replication relation
          reject_if:
            - package supports one individual paper only and has no multi-row corpus/database role
            - package has no row-level artifact and only stores manuscript PDFs or slides
            - package cannot be lawfully inventoried or mirrored enough to triage
          stop_conditions:
            - repository query manifests are saved or summarized
            - every accepted repository lead lands in CORPORA_AND_DATABASES.tsv with repository URL and next action
            - every rejected repository lead has blocker_codes and rejection basis
          outputs:
            - CORPORA_AND_DATABASES.tsv
        - id: plot1_corpusdb_bibliographic_corpus_paper_search
          rank: 3
          lead_type: corpus_or_database
          status: target_manifest_present
          tools:
            - crossref_api
            - openalex_api
            - pubmed_europepmc
          seed_queries:
            - '"replication database" psychology'
            - '"replication database" "effect size"'
            - '"database of replication studies"'
            - '"replication success" "original study"'
            - '"replication rates" "coded" "effect sizes"'
            - '"large-scale replication" "dataset"'
            - '"multi-site replication" "dataset"'
            - '"replication project" "sample size" "effect size"'
            - '"original and replication" "effect size" "sample size"'
            - '"reproducibility project" "effect sizes"'
          existing_artifacts: []
          target_glob: steps/searches/figure1/corporasearch-bibliographic-*.*
          target_examples:
            - steps/searches/figure1/corporasearch-bibliographic-openalex-crossref-replication-database-effect-size.json
            - steps/searches/figure1/corporasearch-bibliographic-openalex-replication-database-effect-size.json
            - steps/searches/figure1/corporasearch-bibliographic-crossref-database-of-replication-studies.json
          target_file_policy: skip_if_exists_unless_replace
          accept_if:
            - article describes or releases a corpus/database of replications, not merely one replication
            - abstract, supplement, data availability statement, or references point to a dataset/package/table
            - paper is likely to expose both original and replication identifiers or coded paired outcomes
          reject_if:
            - article is a conceptual review with no accessible corpus/table lead
            - article reports only aggregate replication rates without row-level study data
            - article is an individual replication paper and should be routed to the individual-paper search
          stop_conditions:
            - bibliographic search strings and candidate decisions are recorded
            - accepted papers are entered in CORPORA_AND_DATABASES.tsv with DOI/URL and expected artifact route
          outputs:
            - CORPORA_AND_DATABASES.tsv
        - id: plot1_corpusdb_citation_snowball_from_known_sources
          rank: 4
          lead_type: corpus_or_database
          status: target_manifest_present
          tools:
            - crossref_api
            - openalex_api
            - manual_literature_review
          seed_queries:
            - sources cited by current replication-project corpora
            - sources citing FReD, SCORE, LOOPR, RPP, Many Labs, RP:CB, and registered replication reports
            - papers sharing references with known replication database papers
            - datasets linked from known replication corpus articles
            - '"FORRT Replication Database" OR FReD'
            - '"DARPA SCORE" replication database claims'
            - '"LOOPR" replication project'
            - '"Reproducibility Project: Psychology" dataset replication'
            - '"Many Labs" replication project dataset'
            - '"Social Science Replication Project" dataset'
            - '"Experimental Economics Replication Project" dataset'
            - '"Reproducibility Project: Cancer Biology" effect level data'
            - '"registered replication report" "many labs"'
          existing_artifacts:
            - CORPORA_AND_DATABASES.tsv
            - data/derived/effect_inflation_dataset/plot1_replication_source_catalog.csv
          target_glob: steps/searches/figure1/corporasearch-citation-snowball-*.*
          target_examples:
            - steps/searches/figure1/corporasearch-citation-snowball-known-replication-corpora.json
            - steps/searches/figure1/corporasearch-citation-snowball-fred-score-loopr-rpp.json
          target_file_policy: skip_if_exists_unless_replace
          accept_if:
            - citing/cited paper points to another replication corpus, coded replication table, or source package
            - relation to original/replication pair discovery is explicit or strongly suggested by metadata
            - lead can be represented by DOI, stable URL, repository URL, or local artifact path
          reject_if:
            - citation only discusses replication without releasing or naming a source table
            - source is already represented with no new route, alias, or artifact
          stop_conditions:
            - each known high-yield corpus has citation-neighborhood search status
            - new leads and rejected near-duplicates are recorded in CORPORA_AND_DATABASES.tsv
          outputs:
            - CORPORA_AND_DATABASES.tsv
        - id: plot1_corpusdb_domain_specific_meta_research_search
          rank: 5
          lead_type: corpus_or_database
          status: target_manifest_present
          tools:
            - crossref_api
            - openalex_api
            - pubmed_europepmc
            - osf_api
            - dataverse_api
          seed_queries:
            - psychology replication database effect size
            - behavioral science replication dataset original study
            - management science replication project dataset
            - operations management replication project data
            - economics replication project original estimates
            - political science replication archive original replication
            - clinical trial pilot full-scale follow-up database
            - neuroscience replication dataset effect size sample size
            - education replication study database
            - preclinical replication project effect size
          existing_artifacts: []
          target_glob: steps/searches/figure1/corporasearch-domain-*.*
          target_examples:
            - steps/searches/figure1/corporasearch-domain-multifield-replication-database-effect-size.json
            - steps/searches/figure1/corporasearch-domain-psychology-replication-database-effect-size.json
            - steps/searches/figure1/corporasearch-domain-clinical-pilot-fullscale-followup.json
          target_file_policy: skip_if_exists_unless_replace
          accept_if:
            - source covers a field where Figure 1 pair rules could apply
            - source offers row-level data or code likely to reconstruct paired D/N or native-to-D inputs
            - source has enough metadata to decide whether replication/follow-up N is larger than original N
          reject_if:
            - source is only a meta-analysis of many original studies with no replication/follow-up relationship
            - source lacks sample-size fields and no source route can recover them
          stop_conditions:
            - each target field has at least one saved accepted or rejected search batch
            - field-specific blockers are summarized in CORPORA_AND_DATABASES.tsv notes
          outputs:
            - CORPORA_AND_DATABASES.tsv
        - id: plot1_corpusdb_code_and_file_name_search
          rank: 6
          lead_type: candidate_result_table
          status: target_manifest_present
          tools:
            - github_code_search_or_clone
            - local_raw_inventory
            - rg_local_repo
          seed_queries:
            - original_d replication_d
            - original_N replication_N
            - replication_pair
            - original_effect replication_effect
            - smaller_N larger_N
            - replication_success
            - effect_size sample_size original replication
            - direct_replication dataset
            - paired replication table
          existing_artifacts:
            - data/raw/corpus_candidates
            - data/raw/replication_projects
          target_glob: steps/searches/figure1/corporasearch-code-*.*
          target_examples:
            - steps/searches/figure1/corporasearch-code-local-original-replication-fields.json
            - steps/searches/figure1/corporasearch-code-original-n-replication-n.tsv
            - steps/searches/figure1/corporasearch-code-original-d-replication-d.tsv
          target_file_policy: skip_if_exists_unless_replace
