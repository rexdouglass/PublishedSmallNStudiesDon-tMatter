        - verbatim_n_text_or_exact_n_field
        - context_match_status
        - parser_or_human_review_method
      reject_if:
        - effect_without_n
        - n_without_effect
        - context_mismatch
        - statistic_type_unclear
        - same_number_ambiguous_across_outcomes
        - source_is_derived_corpus_not_represented_source
    l6_to_l7:
      source_state_before:
        - original_number_extracted
      source_state_after: recomputed_from_raw
      required_evidence:
        - raw_or_analytic_data_file
        - code_or_formula
        - execution_environment_or_formula_version
        - recomputed_output
        - tolerance_rule
      reject_if:
        - missing_data_or_code
        - nonreproducible_environment
        - result_mismatch_without_explanation
  
