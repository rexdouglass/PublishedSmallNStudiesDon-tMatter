            - citing papers whose title or abstract contains replicate, replication, reproduce, robustness, follow-up, validation, re-test, or high-powered
            - citing papers of original effects in staged-unpromoted individual leads
            - citation neighborhoods around request-only corpus rosters where individual public source objects may rescue rows
          existing_artifacts:
            - FIGURE1_REPLICATION_PAIRS.tsv
            - steps/corpus_results/figure1/corpus_closure/figure1-corpus-dataset-closure-actions.tsv
            - steps/individual_replication_papers/figure1/individual-paper-worklist-from-cluster-review.tsv
          target_glob: steps/searches/figure1/individualrepsearch-citation-*.json
          target_examples:
            - steps/searches/figure1/individualrepsearch-citation-known-originals-forward-replication.json
          target_file_policy: skip_if_exists_unless_replace
          accept_if:
