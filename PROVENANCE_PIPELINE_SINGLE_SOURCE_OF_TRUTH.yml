        - define_schema_pilot_sample
        - retrace_current_plot_assertions
      notes: This is a registry-backed search plan, not a global scraper.

    - id: acquire_result_bearing_corpus_artifacts
      stage: obtaining
      rank: 1.5
      status: active_next_step
      input_node_types:
