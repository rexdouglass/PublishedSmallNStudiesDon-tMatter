            coverage_only: source_object_denominator_no_quantitative_row
            reject: rejected_or_context_ledger
          stop_conditions:
            - GPT/Gemini output is saved as JSON with candidate-level source-object URLs and route decisions
            - every high-confidence candidate has a mirror-first object list or a documented access blocker
            - candidate pairs are deduped against FIGURE1_REPLICATION_PAIRS.tsv and known source families before extraction
          outputs:
