  strategies:
    - id: search_plot1_replication_pair_universe
      stage: universe_search
      rank: 1
      status: active_foundation
      input_node_types:
        - plot_universe
      output_node_types:
        - search_space
        - search_query
        - search_lead
      applies_when: Plot 1 needs new paired original/replication result candidates or legacy replication leads need triage.
      stop_conditions:
        - Every replication search track has explicit seed artifacts, tools, accept/reject rules, and output targets.
      scripts:
        - scripts/search_figure1_corpora_databases.py
        - scripts/render_provenance_search_plan.py
        - scripts/build_corpora_and_databases_table.py
      make_targets:
        - provenance-search-plan
      reads:
        - PROVENANCE_PIPELINE_SINGLE_SOURCE_OF_TRUTH.yml
        - reports/corpus_candidates/replication_lead_queue.md
        - data/derived/replication_pairs/harvest/lead_queue_status.csv
      writes:
