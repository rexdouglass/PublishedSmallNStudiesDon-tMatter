            - file inventory suggests original/replication mapping, effect/statistic fields, N fields, or conversion inputs
            - package can be mirrored or sampled enough to decide Figure 1A/B/native/coverage route
          reject_if:
            - package is a corpus/database already routed through CORPORA_AND_DATABASES.tsv
            - package contains only preregistration, manuscript PDF, or materials with no result or source-object route
          stop_conditions:
            - accepted one-paper packages are queued for source-object acquisition and parsing
            - rejected repository hits include blocker_codes and relationship evidence status
          outputs:
