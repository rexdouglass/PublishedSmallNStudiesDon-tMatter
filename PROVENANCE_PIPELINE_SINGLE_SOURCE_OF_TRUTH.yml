            - paperclip_hosted_index
          seed_queries:
            - '"failed to replicate" "original study"'
            - '"could not replicate" "original" "sample"'
            - '"direct replication" "original" "participants"'
            - '"registered replication report" "original study"'
            - '"replication attempt" "effect size" "N"'
            - '"high-powered" "direct replication"'
            - '"conceptual replication" "original effect"'
            - '"external validation" "original study" "effect size"'
            - '"pilot" "full-scale" "same outcome" "effect size"'
          target_glob: steps/searches/figure1/individualrepsearch-bibliographic-*.json
          target_examples:
            - steps/searches/figure1/individualrepsearch-bibliographic-failed-to-replicate-effect-size.json
            - steps/searches/figure1/individualrepsearch-bibliographic-registered-replication-report-individual.json
          target_file_policy: skip_if_exists_unless_replace
          accept_if:
            - bibliographic record is an individual replication/follow-up paper or report
            - abstract or linked full text names the original study, target paper, phenomenon, or trial
            - DOI/PMID/PMCID/open-location route can ground at least the replication/follow-up source
          reject_if:
            - record is a review, editorial, meta-analysis-only source, or corpus/database already covered
