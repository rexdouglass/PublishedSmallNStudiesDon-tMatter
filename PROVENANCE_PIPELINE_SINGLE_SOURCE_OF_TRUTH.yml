            - '"failed to replicate" "effect size" "sample size"'
            - '"direct replication" "Cohen" "original study"'
            - '"we replicated" "sample size" "effect size"'
            - '"high-powered replication" "original effect"'
            - '"replication of" "original study" "sample size"'
            - '"larger sample" "replication" "original"'
            - '"follow-up study" "original effect" "sample size"'
            - '"definitive trial" "pilot trial" "effect size"'
          existing_artifacts:
            - reports/figure1_individual_replication_search_help_prompt_2026-05-05.md
            - steps/individual_replication_papers/figure1/individual-paper-worklist-from-cluster-review.tsv
            - steps/corpus_results/figure1/corpus_closure/figure1-corpus-dataset-closure-actions.tsv
          target_glob: steps/searches/figure1/individualrepsearch-gpt-*.json
          target_examples:
            - steps/searches/figure1/individualrepsearch-gpt-batch001.json
          target_file_policy: skip_if_exists_unless_replace
          accept_if:
            - candidate is a specific original/replication or original/follow-up pair
            - replication/follow-up relation is explicit in title, abstract, methods, report text, registry, or source package
            - source-object URLs exist for both represented sources or for a package/table that names both
            - candidate records effect/N availability or the exact source objects needed to check it
          reject_if:
            - answer only names another corpus/database without a concrete pair
            - later paper is merely related, citing, or conceptually adjacent with no replication/follow-up assertion
            - one-arm outcome lacks comparator and no native-only route is justified
            - same-data robustness/reanalysis is not labeled as reproduction or native/coverage-only
          route_mapping:
            strict_figure1a: individual_source_object_acquisition_and_dn_extraction
            d_equivalent_figure1b: clinical_binary_d_equivalent_worklist
