            - sidecar_source_has_D_N_surface
            - relationship_to_main_plot_universe_recorded
          reject_if:
            - narrative_only_source
            - duplicate_of_existing_source_family
          stop_conditions:
            - comparator and exclusion leads are explicit rather than buried in prose
          outputs:
            - future data/derived/effect_inflation_dataset/search_leads/plot4_sidecar_and_comparator_search.tsv

  review_cues:
    - id: figure1_search_leads
      status: active
      purpose: >
        Reusable bounded review queue for ambiguous Figure 1 corpus/database,
        repository-package, result-table, individual-paper, and context-source
        leads. Deterministic scripts should remove obvious duplicates and
        false positives first. Codex should investigate moderate batches and
        either make auditable decisions or emit compact GPT prompt requests for
        uncertain cases. GPT prompt batches can be larger because they are
        user-mediated review artifacts.
      cue_root: steps/review_cue/figure1_search_leads
      source_inputs:
        - id: figure1_corporasearch_manifests
          glob: steps/searches/figure1/corporasearch-*.json
          buckets:
            - candidates
            - routed_or_rejected_leads
      target_context:
        root_table: CORPORA_AND_DATABASES.tsv
        skip_key_columns:
          - landing_url
          - raw_url
          - source_key
        root_record_kinds:
          - candidate_corpus_or_database
          - candidate_repository_package
        root_review_statuses:
          - discovered_search_lead
          - needs_triage_search_lead
      reviewed_decision_globs:
        - steps/review_cue/figure1_search_leads/reviewcue-decisions-figure1_search_leads-*.json
        - steps/triage/figure1/codextriage-decisions-figure1-*.json
      route_receipts:
        root: steps/review_cue/figure1_search_leads/receipts
        skip_rule: >
          Each applied review decision writes one receipt file under the
          decision-specific directory using a stable slug of lead_key. Future
          review-cue builds skip leads when a receipt file already exists for
          the same lead_key, review_id, canonical_source_key, or duplicate_of.
        decision_directories:
          keep_in_corpora_and_databases: keep_in_corpora_and_databases
          promote_to_corpora_and_databases: promote_to_corpora_and_databases
          route_to_result_table_worklist: route_to_result_table_worklist
          route_to_individual_replication_paper_worklist: route_to_individual_replication_paper_worklist
          route_to_d_equivalent_diagnostic_worklist: route_to_d_equivalent_diagnostic_worklist
          route_to_native_effect_diagnostic_worklist: route_to_native_effect_diagnostic_worklist
          route_to_coverage_denominator_catalog: route_to_coverage_denominator_catalog
          route_to_missing_value_repair_worklist: route_to_missing_value_repair_worklist
          keep_as_context_source: keep_as_context_source
          reject_irrelevant: reject_irrelevant
          needs_more_evidence: needs_more_evidence
          default: needs_more_evidence
      review_record_kinds:
        - candidate_corpus_or_database
        - candidate_repository_package
        - candidate_result_table
        - candidate_bibliographic_paper
        - candidate_context_or_methods_paper
        - candidate_individual_paper_or_package
      deterministic_skip_statuses:
        - rejected_irrelevant_search_hit
      priority_order:
        - candidate_corpus_or_database
        - candidate_repository_package
        - candidate_result_table
        - candidate_bibliographic_paper
        - candidate_context_or_methods_paper
        - candidate_individual_paper_or_package
      batch_policy:
        codex_batch_size: 20
        gpt_batch_size: 50
      decision_contract:
        allowed_decisions:
          - keep_in_corpora_and_databases
          - promote_to_corpora_and_databases
          - route_to_result_table_worklist
          - route_to_individual_replication_paper_worklist
          - route_to_d_equivalent_diagnostic_worklist
          - route_to_native_effect_diagnostic_worklist
          - route_to_coverage_denominator_catalog
          - route_to_missing_value_repair_worklist
          - keep_as_context_source
          - reject_irrelevant
          - needs_more_evidence
        required_fields:
          - review_id
          - lead_key
          - decision
          - confidence
          - reason
          - next_action
        optional_fields:
          - sources_checked
          - promote_payload
          - route_payload
          - user_gpt_prompt_request
          - notes
        allowed_confidence:
          - high
          - medium
          - low
        decision_specific_requirements:
          route_to_individual_replication_paper_worklist:
            required_route_payload_fields:
              - replication_relation_evidence_status
              - replication_relation_evidence
            allowed_replication_relation_evidence_status:
              - explicit_self_described_replication
              - metadata_links_original_and_replication
              - source_contains_pair_mapping
            reject_if: >
              The source is merely an individual pilot, feasibility study,
              ordinary trial, paper, or package with no affirmative evidence
              that it is itself a replication/reproduction/follow-up of an
              identifiable original. Do not route something forward because a
              later larger study might exist.
          route_to_d_equivalent_diagnostic_worklist:
            required_route_payload_fields:
              - alternate_plot_universe_id
              - conversion_route_status
              - conversion_inputs_evidence
            allowed_alternate_plot_universe_id:
              - plot1b_clinical_binary_d_equivalent
            allowed_conversion_route_status:
              - comparative_binary_counts_available
              - odds_ratio_or_log_or_available
              - risk_ratio_or_risk_difference_with_baseline_risk
              - hazard_ratio_with_fixed_time_event_risk
              - needs_custom_policy_review
            reject_if: >
              The source exposes only one-arm response rates, treatment-arm-only
              rates, HR-only values without fixed-time event/survival data, or
              qualitative success labels. Those should route to native-effect,
              coverage-denominator, or missing-value worklists instead.
          route_to_native_effect_diagnostic_worklist:
            required_route_payload_fields:
              - alternate_plot_universe_id
              - native_metric_status
              - native_metric_evidence
            allowed_alternate_plot_universe_id:
              - plot1c_native_effect_retention
            allowed_native_metric_status:
              - one_arm_response_rate
              - treatment_arm_only_response_rate
              - native_ratio_no_common_d_conversion
              - benchmark_metric_no_common_d_conversion
              - mixed_native_metrics
            reject_if: >
              The source has no row-level native values or no original/follow-up
              mapping. Such sources belong in context or coverage-denominator
              routes, not native-effect diagnostics.
          route_to_coverage_denominator_catalog:
            required_route_payload_fields:
              - alternate_plot_universe_id
              - coverage_status
              - coverage_evidence
            allowed_alternate_plot_universe_id:
              - plot1d_source_object_coverage_denominator
            allowed_coverage_status:
              - strict_dn_blocked_by_plot_rule
              - roster_only_pair_mapping
              - effect_values_without_n
              - metadata_only_after_value_search
              - request_only_values_not_obtained
              - blocked_public_byte_route
              - context_source_without_row_values
          route_to_missing_value_repair_worklist:
            required_route_payload_fields:
              - missing_fields
              - repair_route_status
              - next_repair_action
            allowed_repair_route_status:
              - candidate_source_object_known
              - candidate_source_object_not_found
              - bot_blocked_or_paywalled
              - request_only_no_public_route
              - needs_manual_browser_or_library_route
              - no_lawful_route_found
        machine_readable_rule: >
          Codex/GPT prose is never a pipeline input. Reviewers must write JSON
          decisions to the configured decision_json_pattern. The application
          script validates required fields, finite decision vocabularies, and
          confidence vocabularies before writing per-lead receipt targets. The
          routing table is then generated only from those validated receipts.
      outputs:
        queue_json: steps/review_cue/figure1_search_leads/reviewcue-queue-figure1_search_leads.json
        codex_batch_json_pattern: steps/review_cue/figure1_search_leads/reviewcue-codex-{batch_id}-figure1_search_leads.json
        codex_prompt_md_pattern: steps/review_cue/figure1_search_leads/reviewcue-codex-{batch_id}-figure1_search_leads-prompt.md
        gpt_batch_json_pattern: steps/review_cue/figure1_search_leads/reviewcue-gpt-{batch_id}-figure1_search_leads.json
        gpt_prompt_md_pattern: steps/review_cue/figure1_search_leads/reviewcue-gpt-{batch_id}-figure1_search_leads-prompt.md
        decision_json_pattern: steps/review_cue/figure1_search_leads/reviewcue-decisions-figure1_search_leads-{reviewer}-{batch_id}.json
        routing_table_tsv: steps/review_cue/figure1_search_leads/reviewcue-routing-table-figure1_search_leads.tsv
        routing_table_json: steps/review_cue/figure1_search_leads/reviewcue-routing-table-figure1_search_leads.json
        corpora_table_update_proposal_tsv: steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/corpora-table-update-proposal.tsv
        corpora_table_update_validation_tsv: steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/corpora-table-update-validation.tsv
        corpora_table_updated_preview_tsv: steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/corpora-table-updated-preview.tsv
        gpt_field_coding_needed_tsv: steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/gpt-field-coding-needed.tsv
        gpt_field_coding_prompt_pattern: steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/gpt-field-coding-prompt-{batch_id}.md
      application_policy:
        current_status: receipt_and_proposal_steps_active_root_table_apply_future
        rule: >
          Review decisions are first applied as per-lead target-file receipts,
          not as one large append-only log. The receipt files are the durable
          skip mechanism for future cue builds. The proposal step consumes the
          routing table and writes preview/validation artifacts plus a GPT field
          coding cue for accepted root-table rows. Prompt output still must not
          directly edit root tables; a later apply step should validate field
          coding and require an explicit apply flag.
  
  execution_dags:
    - id: figure1_corpora_database_intake_dag
      scope: plot1_replication_pairs
      status: active_foundation
      principle: >
        Keep top-of-pipeline corpus/database intake acyclic by treating
        generated artifacts as versioned snapshots. The previous
        CORPORA_AND_DATABASES.tsv snapshot may be read as merge context; the
        current CORPORA_AND_DATABASES.tsv snapshot is the output of the merge
        step. There is no table-to-itself edge.
      nodes:
        - id: pipeline_spec_root_yml
          kind: specification
          materialized_as: PROVENANCE_PIPELINE_SINGLE_SOURCE_OF_TRUTH.yml
          role: Defines plot universes, search tracks, target contracts, and DAG edges.
        - id: render_search_plan_step
          kind: script_step
          materialized_as: scripts/render_provenance_search_plan.py
          role: Renders top-of-pipeline search tracks from the root YAML.
        - id: provenance_search_plan_artifacts
          kind: generated_artifacts
          materialized_as:
            - data/derived/effect_inflation_dataset/provenance_search_plan.tsv
            - reports/provenance_universe_search_plan.md
          role: Human-readable and machine-readable search plan.
        - id: local_seed_artifacts
          kind: input_artifact_set
          materialized_as:
            - data/derived/effect_inflation_dataset/plot1_replication_source_catalog.csv
            - data/raw/replication_projects/lead_registry.csv
            - data/derived/replication_pairs/replication_source_worklist.csv
            - data/raw/corpus_candidates
            - data/raw/replication_projects
            - reports/corpus_suggestion_tracker.md
            - reports/corpus_candidates/replication_lead_queue.md
          role: Existing local evidence that should flow directly into the root corpus/database table.
        - id: concrete_new_source_search_outputs
          kind: optional_input_artifact_set
          materialized_as: steps/searches/figure1/corporasearch-*.{tsv,csv,json}
          role: >
            Concrete query/search outputs, one file per method plus
            search-term/scope combination. These are not mirrors of the root table.
        - id: figure1_corpora_search_runner_step
          kind: script_step
          materialized_as:
            - scripts/search_figure1_corpora_databases.py
            - make figure1-corpora-search-expanded
          role: >
            Writes skip-safe Figure 1 search target manifests. Baseline and
            expanded searches use distinct corporasearch-* filenames so exact
            searches can be skipped by file existence unless --replace is set.
        - id: search_yield_summary_step
          kind: script_step
          materialized_as:
            - scripts/summarize_figure1_search_yield.py
            - make figure1-corpora-search-yield
          role: >
            Diagnostic fan-in over saved search manifests. It compares baseline
            and expanded search manifests against each other and the current
            root table to reveal marginal yield and diminishing returns.
        - id: search_yield_summary_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/searches/figure1/searchyield-figure1-corpusdb-summary.tsv
            - steps/searches/figure1/searchyield-figure1-corpusdb-expanded-new-leads.tsv
            - steps/searches/figure1/searchyield-figure1-corpusdb-summary.md
          role: >
            Machine-readable and human-readable search-yield diagnostics. These
            files do not use the corporasearch-* prefix and are not consumed as
            root-table lead manifests.
        - id: source_artifacts_schema
          kind: schema_placeholder
          materialized_as:
            - SOURCE_ARTIFACTS_SCHEMA.yml
            - SOURCE_ARTIFACTS.tsv
          role: >
            Root-level placeholder schema/table for child artifacts under
            source-family rows. It keeps CORPORA_AND_DATABASES.tsv at the
            source-family grain while concrete OSF components, repository
            files, workbooks, local mirrors, and parser candidates can be
            inventoried separately.
        - id: corpus_results_schema
          kind: schema_placeholder
          materialized_as:
            - CORPUS_RESULTS_SCHEMA.yml
            - CORPUS_RESULTS.tsv
          role: >
            Root-level placeholder schema/table for corpus-native result rows.
            This is the assertion layer between accepted source-family
            artifacts and paper-level source_result extraction: preserve every
            result-bearing row a corpus/database/table exposes before any
            standardization to D, standardized N, canonical plotted dots, or
            original-source verification.
        - id: alias_cluster_step
          kind: script_step
          materialized_as:
            - scripts/cluster_figure1_search_leads.py
            - make figure1-cluster-search-leads
          role: >
            Read-only bridge from search leads to source-family review. It
            consumes the root table, corporasearch manifests, review queue, and
            receipt targets, then groups exact identifiers and high-confidence
            source-family hints into cluster/priority artifacts.
        - id: alias_cluster_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/searches/figure1/alias-clusters-leads-artifacts-root-v001.json
            - steps/review_cue/figure1_search_leads/clustered-priority-queue.tsv
            - steps/review_cue/figure1_search_leads/clustered-priority-queue-summary.tsv
          role: >
            Machine-readable alias/source-family clusters and a review-priority
            queue. These artifacts are not root-table mutations; they tell
            Codex/GPT which cluster representative and aliases to review first.
        - id: clustered_review_cue_step
          kind: script_step
          materialized_as:
            - scripts/build_clustered_review_cue.py
            - make figure1-cluster-review-cue
          role: >
            Builds a bounded Codex prompt over source-family clusters instead
            of isolated leads. The output is a review handoff artifact; it does
            not apply decisions or edit root tables.
        - id: clustered_review_cue_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/review_cue/figure1_search_leads/reviewcue-clustered-codex-*-figure1_search_leads.json
            - steps/review_cue/figure1_search_leads/reviewcue-clustered-codex-*-figure1_search_leads-prompt.md
          role: >
            Cluster-level review batches showing representative source-family
            leads plus linked aliases/artifacts. Decisions from these batches
            still need a later application adapter before they can write
            receipt targets.
        - id: clustered_review_decisions
          kind: optional_human_llm_artifact_set
          materialized_as:
            - steps/review_cue/figure1_search_leads/reviewcue-clustered-decisions-figure1_search_leads-codex-*.json
          role: >
            Cluster-level Codex/GPT/human decisions. These decide whether a
            source-family cluster should become an artifact-inventory task,
            remain a source-family candidate, route to result-table or
            individual-paper worklists, or stop as context.
        - id: clustered_review_decision_application
          kind: script_step
          materialized_as:
            - scripts/apply_clustered_review_decisions.py
            - make apply-cluster-review-cue
          role: >
            Applies clustered decisions without editing root tables. It writes
            one receipt target per reviewed cluster, a clustered routing table,
            and a source-family artifact inventory queue.
        - id: clustered_review_routing_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/review_cue/figure1_search_leads/cluster_receipts/*/*.json
            - steps/review_cue/figure1_search_leads/reviewcue-clustered-routing-table-figure1_search_leads.tsv
            - steps/review_cue/figure1_search_leads/reviewcue-clustered-routing-table-figure1_search_leads.json
          role: >
            Machine-readable cluster-level routing fan-in. Downstream steps can
            consume these artifacts instead of re-spending review attention on
            the same cluster.
        - id: source_family_artifact_inventory_queue
          kind: generated_artifact
          materialized_as:
            - steps/source_inventory/figure1/source-family-artifact-inventory-queue.tsv
            - steps/source_inventory/figure1/source-family-artifact-inventory-queue.json
          role: >
            Queue of source families whose child artifacts need inventory,
            dedupe, parser assignment, and later SOURCE_ARTIFACTS.tsv
            proposals.
        - id: result_artifact_acquisition_queue_step
          kind: script_step
          materialized_as:
            - scripts/build_result_artifact_acquisition_queue.py
            - make result-artifact-acquisition-queue
            - make figure1-result-artifact-acquisition-queue
            - make figure2-result-artifact-acquisition-queue
            - make figure3-result-artifact-acquisition-queue
          role: >
            Reusable acquisition-queue builder for any plot universe represented
            in CORPORA_AND_DATABASES.tsv. For each plot-scoped source-family
            row, it asks whether a result-bearing corpus artifact is already
            local, whether an existing local mirror still needs inspection, or
            which provider/manual route should put the needed artifact on disk.
        - id: result_artifact_acquisition_queue_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-queue.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-queue.json
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-summary.tsv
            - steps/source_inventory/figure2/result_artifact_acquisition/figure2-result-artifact-acquisition-queue.tsv
            - steps/source_inventory/figure2/result_artifact_acquisition/figure2-result-artifact-acquisition-queue.json
            - steps/source_inventory/figure2/result_artifact_acquisition/figure2-result-artifact-acquisition-summary.tsv
            - steps/source_inventory/figure3/result_artifact_acquisition/figure3-result-artifact-acquisition-queue.tsv
            - steps/source_inventory/figure3/result_artifact_acquisition/figure3-result-artifact-acquisition-queue.json
            - steps/source_inventory/figure3/result_artifact_acquisition/figure3-result-artifact-acquisition-summary.tsv
          role: >
            Machine-readable queue for getting plot-scoped corpora/source
            families onto disk at the right artifact grain. The goal is not
            merely a landing page or citation; the queue names the artifact
            class and route needed to obtain the local object that catalogs
            corpus results for the relevant plot universe.
        - id: result_artifact_acquisition_strategy_step
          kind: script_step
          materialized_as:
            - scripts/run_result_artifact_acquisition_strategies.py
            - make figure1-result-artifact-acquisition-strategies
          role: >
            Route-specific strategy runner over the acquisition queue. It
            inventories OSF, Dataverse, Zenodo, Figshare, direct URLs, local
            mirrors, and article/supplement links, then writes proposed
            SOURCE_ARTIFACTS-shaped rows plus attempts and manual tasks. This
            is still proposal-only; it does not decide that the discovered file
            is relevant until the mirror/sample/parser stages inspect bytes.
        - id: result_artifact_acquisition_strategy_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal.json
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-attempts.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-manual-tasks.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-strategy-summary.tsv
          role: >
            Machine-readable artifact leads discovered by automated acquisition
            strategies. These outputs separate downloadable candidates,
            metadata-only evidence, failed attempts, and human/manual follow-up.
        - id: result_artifact_proposal_filter_step
          kind: script_step
          materialized_as:
            - scripts/filter_source_artifact_proposal.py
            - make figure1-result-artifact-acquisition-filter-tabular
            - make figure1-result-artifact-acquisition-filter-documents
            - make figure1-result-artifact-acquisition-filter-remaining-downloadable
          role: >
            Deterministic narrowing step for large proposal files. The
            result-table-first mode selects materializable table, workbook,
            archive, statistical-data, and analysis-code artifacts so the DAG can
            mirror likely result-bearing objects before spending time on PDFs,
            landing pages, and metadata-only rows. The document-first mode then
            mirrors PDF/HTML artifacts with text/link sampling. Remaining
            downloadable mode records the leftover materializable oddities
            separately so they can be repaired without rerunning broad scrapers.
        - id: result_artifact_proposal_filter_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-tabular-first.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-tabular-first.json
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-tabular-first-summary.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-documents.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-documents.json
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-documents-summary.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-remaining-downloadable.tsv
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-remaining-downloadable.json
            - steps/source_inventory/figure1/result_artifact_acquisition/figure1-result-artifact-acquisition-artifacts-proposal-remaining-downloadable-summary.tsv
          role: >
            The first mirror/sample workset for result-bearing acquisition:
            structured tables, workbooks, archives, R/Stata/SPSS data, JSON,
            analysis code, then document/source-object files that can be
            inspected cheaply and deterministically.
        - id: source_family_artifact_inventory_step
          kind: script_step
          materialized_as:
            - scripts/inventory_source_family_artifacts.py
            - make source-family-artifact-inventory
          role: >
            Proposal-only inventory step. It consumes reviewed source-family
            inventory tasks, fingerprints local mirrors, records provider
            manifest entries, assigns coarse parser families, and writes
            SOURCE_ARTIFACTS.tsv-shaped proposals without editing the root
            artifact table.
        - id: source_artifacts_proposal
          kind: generated_artifacts
          materialized_as:
            - steps/source_inventory/figure1/source-artifacts-proposal.tsv
            - steps/source_inventory/figure1/source-artifacts-proposal.json
            - steps/source_inventory/figure1/source-artifact-inventory-summary.tsv
            - steps/source_inventory/figure1/source-artifacts-proposal-validation.tsv
            - steps/source_inventory/figure1/*/inventory-source-artifacts-proposal-*.tsv
            - steps/source_inventory/figure1/*/inventory-source-artifacts-proposal-*.json
          role: >
            Machine-readable SOURCE_ARTIFACTS.tsv proposal outputs. These
            separate source-family parent rows from concrete child artifacts
            such as CSVs, workbooks, provider manifests, download metadata,
            scripts, PDFs, and archive files.
        - id: source_artifact_mirror_sample_step
          kind: script_step
          materialized_as:
            - scripts/mirror_and_sample_source_artifacts.py
            - make source-artifact-mirror-sample
            - make figure1-result-artifact-acquisition-mirror-tabular-first
            - make figure1-result-artifact-acquisition-mirror-documents
            - make figure1-result-artifact-acquisition-mirror-remaining-downloadable
