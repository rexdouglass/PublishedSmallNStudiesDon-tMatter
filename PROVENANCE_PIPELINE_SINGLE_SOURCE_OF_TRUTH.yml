    - id: search_plan_plot1_replication_pairs
      universe_id: plot1_replication_pairs
      goal: Find replication/follow-up source families and projects, then resolve the original target and both D/N sides of each pair.
      search_direction: replication_first_then_resolve_original
      result_target_kind: replication_pair_result
      target_file_contract:
        target_root: steps/searches/figure1
        rule: >
          Individual replication searches write individualrepsearch-* manifests.
          These are not corpus/database manifests and should not flow directly
          into CORPORA_AND_DATABASES.tsv unless the search unexpectedly finds a
          true multi-row source family. Each manifest preserves query routes,
          candidate pair decisions, source-object URLs, relationship evidence,
          value availability, blocker codes, and recommended next actions.
        naming_convention: >
          Use individualrepsearch-{method-or-surface}-{batch-or-query-scope}.{json|tsv}.
          Examples: individualrepsearch-gpt-batch001.json,
          individualrepsearch-pubmed-failed-to-replicate-effect-size.json,
          individualrepsearch-osf-direct-replication-single-paper-packages.json.
        target_file_policy: skip_if_exists_unless_replace
        downstream_worklists:
          strict_figure1a: steps/individual_replication_papers/figure1/individual-paper-worklist-from-search.tsv
          d_equivalent_figure1b: steps/individual_replication_papers/figure1/individual-paper-worklist-d-equivalent.tsv
          native_only: steps/individual_replication_papers/figure1/individual-paper-worklist-native-only.tsv
          coverage_only: steps/individual_replication_papers/figure1/individual-paper-worklist-coverage-only.tsv
          rejected_or_context: steps/individual_replication_papers/figure1/individual-paper-search-rejections.tsv
        prompt_artifact:
          - reports/figure1_individual_replication_search_help_prompt_2026-05-05.md
      minimum_lead_fields:
        - lead_id
        - lead_title
        - source_family
        - replication_or_followup_source_hint
        - original_source_hint
        - pair_relationship_basis
        - expected_result_count
        - result_fields_available
        - candidate_artifact_path_or_url
        - triage_status
      promotion_gate_to_result_target: >
        Promote only when a replication/follow-up lead exposes both sides, or
        enough source objects to resolve both sides, plus a relationship basis
        connecting the replication/follow-up result to the original claim. Do
        not require the original or replication to be published.
      search_tracks:
        - id: plot1_local_replication_harvest_inventory
          rank: 1
          lead_type: replication_project
          status: seeded_from_existing_artifact
          tools:
            - local_derived_inventory
            - local_raw_inventory
            - rg_local_repo
          seed_queries:
            - replication lead queue
            - staged replication harvest
            - promoted replication pairs
            - replication source worklist
            - original target resolution only after replication lead found
          existing_artifacts:
            - reports/corpus_candidates/replication_lead_queue.md
            - reports/corpus_candidates/replication_pair_source_catalog.md
            - data/derived/effect_inflation_dataset/plot1_replication_source_catalog.csv
            - data/derived/replication_pairs/harvest/lead_queue_status.csv
            - data/derived/replication_pairs/harvest/staged
            - data/derived/replication_pairs/harvest/promoted
            - data/derived/replication_pairs/replication_source_worklist.csv
            - data/raw/replication_projects/lead_registry.csv
          accept_if:
            - paired_original_and_replication_fields_present
            - relationship_mapping_basis_present
            - D_or_native_effect_and_N_available_or_extractable
            - replication_or_followup_lead_found_before_original_resolution
          reject_if:
            - aggregate_only_without_pair_rows
            - replication_label_without_original_target
            - no_result_level_fields
          stop_conditions:
            - every existing lead is promoted, rejected, or assigned parser/blocker status
          outputs:
            - data/derived/effect_inflation_dataset/provenance_search_plan.tsv
            - future data/derived/effect_inflation_dataset/search_leads/plot1_replication_pairs.tsv
        - id: plot1_public_replication_project_search
          rank: 2
          lead_type: repository_package
          status: not_started
          tools:
            - osf_api
            - dataverse_api
            - openicpsr_api_or_browser
            - github_code_search_or_clone
            - crossref_api
            - openalex_api
          seed_queries:
            - direct replication dataset
            - registered replication report data
            - Many Labs replication data
            - reproducibility project replication package
            - pilot full-scale replication psychology
            - follow-up study original target mapping
          existing_artifacts:
            - data/raw/replication_projects/lead_harvest
            - data/raw/replication_projects/manual_papers
          accept_if:
            - project_contains_original_and_replication_mapping
            - row_level_effect_or_conversion_inputs_available
            - replication_or_followup_lead_found_before_original_resolution
          reject_if:
            - discussion_or_review_without_row_data
            - aggregate_meta_result_only
