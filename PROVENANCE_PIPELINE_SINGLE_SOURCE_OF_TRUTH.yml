            - original and follow-up source objects can be grounded by DOI/PMID/PMCID/URL
            - candidate looks outside already-covered corpus rows or records its likely overlap for dedupe
          reject_if:
            - citing paper merely discusses, cites, extends theory, or includes the original in a literature review
            - no result-level source-object route is visible
          stop_conditions:
