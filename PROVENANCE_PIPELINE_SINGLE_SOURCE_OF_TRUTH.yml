          role: Single root-level intake table for discovered corpus/database-like sources.
        - id: corpora_databases_schema
          kind: generated_artifact
          materialized_as: CORPORA_AND_DATABASES_SCHEMA.yml
          role: Human/LLM-readable schema for the root corpus/database table.
        - id: deterministic_triage_queue_step
          kind: script_step
          materialized_as:
            - scripts/build_review_cue.py --cue-id figure1_search_leads
            - scripts/build_figure1_codex_triage_batches.py
          role: >
            Reusable review-cue builder. It reads configured manifests and the
            current root target, skips leads already in target tables or already
            reviewed, preserves deterministic routed/rejected records, and
            writes bounded Codex and GPT prompt batches only for unresolved
            leads. The Figure 1 specific script is retained as a legacy wrapper
            until decision application is centralized.
          batch_policy:
            default_batch_size: 20
            rule: Keep batches moderate so Codex review remains high judgment and auditable.
        - id: codex_triage_queue_artifact
          kind: generated_artifact
          materialized_as:
            - steps/review_cue/figure1_search_leads/reviewcue-queue-figure1_search_leads.json
            - steps/triage/figure1/codextriage-queue-figure1-search-leads.json
          role: All unresolved reviewable search leads after deterministic skips.
        - id: codex_triage_batch_artifact
          kind: generated_artifact
          materialized_as:
            - steps/review_cue/figure1_search_leads/reviewcue-codex-*-figure1_search_leads.json
            - steps/review_cue/figure1_search_leads/reviewcue-codex-*-figure1_search_leads-prompt.md
            - steps/triage/figure1/codextriage-batch*-figure1-search-leads.json
            - steps/triage/figure1/codextriage-batch*-figure1-search-leads-prompt.md
          role: >
            Bounded on-demand Codex review batch with prompt and lead records.
            Codex can investigate sources and return decisions; uncertain cases
            should include user_gpt_prompt_request text.
        - id: gpt_triage_batch_artifact
          kind: generated_artifact
          materialized_as:
            - steps/review_cue/figure1_search_leads/reviewcue-gpt-*-figure1_search_leads.json
            - steps/review_cue/figure1_search_leads/reviewcue-gpt-*-figure1_search_leads-prompt.md
          role: >
            Larger user-mediated GPT Pro prompt batch. The Markdown prompt is a
            handoff artifact: copy it into GPT, then paste the JSON result back
            as a decisions artifact.
        - id: codex_triage_previous_decisions
          kind: versioned_prior_artifact
          materialized_as: steps/triage/figure1/codextriage-decisions-figure1-*.json@previous
          role: >
            Prior Codex/human decisions from earlier review batches. These are
            read only to skip already reviewed leads when building a new queue.
        - id: review_cue_previous_receipts
          kind: versioned_prior_artifact
          materialized_as: steps/review_cue/figure1_search_leads/receipts/*/*.json@previous
          role: >
            Prior per-lead receipt target files. These are read only to skip
            already routed, rejected, kept, or escalated leads when building a
            new review cue.
        - id: codex_triage_decisions
          kind: optional_human_llm_artifact_set
          materialized_as:
            - steps/review_cue/figure1_search_leads/reviewcue-decisions-figure1_search_leads-*.json
            - steps/triage/figure1/codextriage-decisions-figure1-*.json
          role: Explicit Codex/human decisions that can later promote, route, or reject ambiguous leads.
        - id: review_cue_receipts
          kind: generated_artifact
          materialized_as: steps/review_cue/figure1_search_leads/receipts/*/*.json
          role: >
            One target-file receipt per reviewed lead. Future review-cue builds
            skip reviewed leads by these files before spending more human,
            Codex, or GPT attention.
        - id: review_cue_routing_table
          kind: generated_artifact
          materialized_as:
            - steps/review_cue/figure1_search_leads/reviewcue-routing-table-figure1_search_leads.tsv
            - steps/review_cue/figure1_search_leads/reviewcue-routing-table-figure1_search_leads.json
          role: >
            Machine-readable fan-in table generated from validated receipt
            targets. This is the artifact downstream scripts consume to see
            what advances, routes to another worklist, stays context-only, or
            stops.
        - id: review_cue_decision_application
          kind: script_step
          materialized_as:
            - scripts/apply_review_cue_decisions.py
            - scripts/build_review_cue_routing_table.py
            - make apply-review-cue
            - make review-cue-routing-table
          role: >
            Receipt application is active: it consumes Codex/GPT decision JSON
            and emits per-lead receipt target files, then materializes a
            machine-readable routing table from those receipts.
        - id: corpora_table_update_proposal_step
          kind: script_step
          materialized_as:
            - scripts/build_corpora_table_update_proposal.py
            - make corpora-table-update-proposal
          role: >
            Last-mile proposal step. It consumes the review-cue routing table,
            matches decisions to existing CORPORA_AND_DATABASES.tsv rows,
            writes a proposal, validation table, updated preview, and a GPT
            field-coding prompt for accepted rows whose prose/semantic fields
            are still undercoded. It does not mutate the root table.
        - id: corpora_table_update_proposal_artifacts
          kind: generated_artifacts
          materialized_as:
            - steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/corpora-table-update-proposal.tsv
            - steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/corpora-table-update-validation.tsv
            - steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/corpora-table-updated-preview.tsv
          role: Machine-readable proposed status/field updates and validation preview before any root-table mutation.
        - id: gpt_field_coding_prompt_artifact
          kind: generated_artifact
          materialized_as:
            - steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/gpt-field-coding-needed.tsv
            - steps/review_cue/figure1_search_leads/apply_to_CORPORA_AND_DATABASES/gpt-field-coding-prompt-*.md
          role: User-mediated GPT cue for accepted rows whose prose/semantic target fields need source-aware coding.
        - id: downstream_corpus_triage_and_parsing
          kind: future_step_family
          materialized_as: future source/source_result/mapping tables
          role: Later steps that split accepted corpus/database rows into detailed provenance tables.
