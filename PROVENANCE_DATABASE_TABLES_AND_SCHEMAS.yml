      allowed_values: ''
      definition: Landing URL, DOI URL, repository URL, registry URL, or project URL for the lead.
      coding_rules: Prefer stable project/repository/article URLs over search result URLs.
      example: ''
    - name: lead_source_path
      data_type: path
      required_level: conditional
      allowed_values: ''
      definition: Repo-relative path where the lead was found or staged.
      coding_rules: Use for local inventories, mirrored raw payloads, staged files, or manual PDFs.
      example: ''
    - name: query_or_seed
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Query, seed artifact, or manual search term that produced the lead.
      coding_rules: Keep exact enough to repeat the search.
      example: ''
    - name: discovered_by
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Tool/person/process that found the lead.
      coding_rules: 'Examples: codex, user, rg_local_repo, OSF API, Crossref.'
      example: ''
    - name: discovered_at
      data_type: datetime
      required_level: recommended
      allowed_values: ''
      definition: Discovery timestamp/date.
      coding_rules: Use ISO date/time or at least YYYY-MM-DD.
      example: ''
    - name: candidate_artifact_path_or_url
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: File, page, dataset, package, or paper artifact to inspect next.
      coding_rules: May be URL or repo-relative path; promote to source/source_access after triage.
      example: ''
    - name: expected_result_count
      data_type: integer
      required_level: optional
      allowed_values: ''
      definition: Expected number of result rows the lead may emit.
      coding_rules: Use rough count when available; blank if unknown.
      example: ''
    - name: expected_pair_count
      data_type: integer
      required_level: optional
      allowed_values: ''
      definition: Expected number of original/replication pairs for replication leads.
      coding_rules: Use for Plot 1 source planning.
      example: ''
    - name: result_fields_available
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Known or suspected result fields available in the lead.
      coding_rules: 'Examples: D|N, native_effect|SE|N, original_d|replication_d|original_N|replication_N.'
      example: ''
    - name: original_source_hint
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Original paper/study/source hint if the lead appears to involve a replication pair.
      coding_rules: For Plot 1, fill after a replication lead exposes or implies an original target.
      example: ''
    - name: replication_or_followup_source_hint
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Replication, reproduction, robustness, extension, or follow-up source hint.
      coding_rules: For individual replication-paper leads, this is usually the lead paper itself.
      example: ''
    - name: pair_relationship_basis
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Evidence that the lead contains or asserts an original/replication relationship.
      coding_rules: Use verbatim wording or field names where possible.
      example: ''
    - name: publication_link_hint
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Publication link or eventual-publication hint.
      coding_rules: Useful for Figure 2/3 and future contexts; not required for Figure 1.
      example: ''
    - name: triage_status
      data_type: category
      required_level: required
      allowed_values: not_started | seeded_from_existing_artifact | candidate_found | candidate_rejected
        | staged_for_parser | promoted_to_result_target | blocked_access | blocked_no_result_fields |
        blocked_scope_mismatch | deprecated_duplicate
      definition: Current search-lead status.
      coding_rules: Keep blocked/excluded/duplicate leads rather than deleting them.
      example: candidate_found
    - name: lead_decision
      data_type: category
      required_level: required
      allowed_values: not_triaged | promote_to_source | promote_to_source_result | stage_for_parser |
        catalog_only | reject_scope_mismatch | reject_duplicate | blocked_access | blocked_missing_fields
        | manual_review_required
      definition: Current decision for this lead.
      coding_rules: Decide whether to promote, stage, catalog, reject, or send to manual review.
      example: not_triaged
    - name: decision_basis
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Why the lead decision was made.
      coding_rules: Cite fields, URLs, files, scope criteria, or blocker facts.
      example: ''
    - name: blocker_codes
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Pipe-delimited blockers if lead is not promotable now.
      coding_rules: 'Examples: access_blocked|missing_D_N|scope_mismatch|duplicate.'
      example: ''
    - name: promoted_source_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Source ID created from this lead.
      coding_rules: Fill when the lead becomes a source.tsv row.
      example: ''
    - name: promoted_source_result_ids
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Pipe-delimited source_result IDs emitted from this lead.
      coding_rules: Fill when parser or manual extraction creates result rows.
      example: ''
    - name: next_action
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Next action needed for this lead.
      coding_rules: 'Examples: download_package, parse_workbook, resolve_original, manual_pdf_check, no_action.'
      example: ''
    - name: notes
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Lead-level notes.
      coding_rules: Keep concise; do not store final extraction evidence here.
      example: ''
  - table_name: source_result.tsv
    grain: One result asserted or exposed by one extraction source.
    primary_key: source_result_id
    required_for_promotion: Required for every plotted or staged result.
    description: 'The lowest-level evidence row: verbatim source text, parsed native values, standardized
      D/N, and transformation notes.'
    columns:
    - name: source_result_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable unique assertion/result ID.
      coding_rules: One extraction source asserting one result. Do not merge alternate sources here.
      example: ''
    - name: canonical_result_id
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Foreign key to canonical_result.tsv.
      coding_rules: May be blank until resolution.
      example: ''
    - name: extraction_source_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Source where literal extracted text/number came from.
      coding_rules: May be a database, paper, PDF, result CSV, or package output.
      example: ''
    - name: represented_source_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Source/study/paper that the result is about.
      coding_rules: Same as extraction_source_id only when extracting directly from the represented work.
      example: ''
    - name: access_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Foreign key to exact access route.
      coding_rules: Must point to retrievable bytes or documented barrier.
      example: ''
    - name: source_locator
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Precise locator inside source.
      coding_rules: Use table/page/row/API JSON path/file member/script output; labels alone are insufficient.
      example: ''
    - name: result_label
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Human label for the result/dot.
      coding_rules: Descriptive only; not evidence text.
      example: ''
    - name: outcome_label
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Human outcome label.
      coding_rules: Descriptive only; not a substitute for verbatim outcome text.
      example: ''
    - name: verbatim_source_row_text
      data_type: string
      required_level: required_for_promotion
      allowed_values: ''
      definition: Source row/table/API text copied as directly as practical.
      coding_rules: This is the human-checkable evidence string; one-line TSV safe.
      example: ''
    - name: verbatim_outcome_text
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Exact outcome text from source.
      coding_rules: Use source wording, not cleaned labels.
      example: ''
    - name: verbatim_effect_text
      data_type: string
      required_level: required_for_d_or_native
      allowed_values: ''
      definition: Exact effect/statistic text from source.
      coding_rules: Do not put D here unless source itself reports D.
      example: ''
    - name: verbatim_se_text
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Exact SE text from source.
      coding_rules: Required when native SE is used.
      example: ''
    - name: verbatim_n_text
      data_type: string
      required_level: required_for_promotion
      allowed_values: ''
      definition: Exact N/sample-size text from source.
      coding_rules: Must identify whether respondent, arm, cluster, enrollment, or analytic N.
      example: ''
    - name: verbatim_p_text
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Exact p/t/z/F text from source.
      coding_rules: Required if conversion uses a significance statistic.
      example: ''
    - name: verbatim_ci_text
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Exact CI text from source.
      coding_rules: Required if conversion uses CI.
      example: ''
    - name: native_effect_value
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Parsed native effect value.
      coding_rules: Parse without changing metric.
      example: ''
    - name: native_effect_metric
      data_type: category
      required_level: conditional
      allowed_values: mean_difference | standardized_mean_difference | odds_ratio | log_odds_ratio | risk_difference
        | correlation | regression_coefficient | t_statistic | z_statistic | f_statistic | p_value_only
        | hazard_ratio | rate_ratio | count_difference | native_ate | elasticity | unknown
      definition: Metric of native_effect_value.
      coding_rules: Required when native effect is present.
      example: ''
    - name: native_standard_error
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Parsed native standard error.
      coding_rules: Do not back-calculate if source used adjusted/clustered models unless documented.
      example: ''
    - name: native_ci_low
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Parsed native CI lower bound.
      coding_rules: Only if source reports CI.
      example: ''
    - name: native_ci_high
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Parsed native CI upper bound.
      coding_rules: Only if source reports CI.
      example: ''
    - name: native_p_value
      data_type: number_or_string
      required_level: conditional
      allowed_values: ''
      definition: Parsed p-value, allowing inequalities.
      coding_rules: Preserve '<0.001' in verbatim field; clean numeric companion may be blank.
      example: ''
    - name: native_n_total
      data_type: number
      required_level: required_for_promotion
      allowed_values: ''
      definition: Parsed total N for the result.
      coding_rules: Use analytic N when clear; store respondent/cluster split separately.
      example: ''
    - name: native_n_treatment
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Treatment-arm N.
      coding_rules: Required for event-count/log-OR conversions when available.
      example: ''
    - name: native_n_control
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Control-arm N.
      coding_rules: Required for event-count/log-OR conversions when available.
      example: ''
    - name: native_cluster_n
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Cluster count.
      coding_rules: Required for clustered designs when reported.
      example: ''
    - name: unit_of_randomization
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Randomization unit.
      coding_rules: 'Examples: individual, village, school, paper, trial, precinct.'
      example: ''
    - name: unit_of_analysis
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Analysis/sample unit.
      coding_rules: 'Examples: respondent, cluster, trial arm, claim, paper.'
      example: ''
    - name: standardized_effect_value
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Final standardized effect for D-axis or proxy.
      coding_rules: Blank for native-only rows.
      example: ''
    - name: standardized_effect_metric
      data_type: category
      required_level: conditional
      allowed_values: d | hedges_g | smd | chinn_log_or_to_d | r_to_d | fisher_z_to_d | t_to_d | z_to_d
        | d_proxy | native_only | not_promoted
      definition: Metric for standardized_effect_value.
      coding_rules: Use native_only when not D-promotable.
      example: ''
    - name: standardized_n
      data_type: number
      required_level: required_for_plot
      allowed_values: ''
      definition: N used for plotting/statistics.
      coding_rules: Must explain cluster-vs-respondent choice in transformation_explanation.
      example: ''
    - name: d
      data_type: number
      required_level: conditional
      allowed_values: ''
      definition: Cohen's d or D-axis value.
      coding_rules: Only populate when conversion is defensible.
      example: ''
    - name: d_conversion_method
      data_type: category
      required_level: required_for_promotion
      allowed_values: reported_d | reported_g | reported_smd | chinn_log_or_to_d | event_counts_to_log_or_to_d
        | r_to_d | fisher_z_to_r_to_d | standardized_outcome_coefficient | source_provided_d_proxy | paper_median_of_child_d
        | no_d_native_metric | blocked_missing_inputs
      definition: Method used to get D or reason no D exists.
      coding_rules: Do not force linear-probability ATEs to d without baseline/SD/event counts.
      example: ''
    - name: d_conversion_inputs
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Inputs used for D conversion.
      coding_rules: List formulas and source fields, e.g. logOR=-0.4; d=logOR*sqrt(3)/pi.
      example: ''
    - name: transformation_explanation
      data_type: string
      required_level: required_for_promotion
      allowed_values: ''
      definition: Plain-language explanation from verbatim/native fields to final D/N/native panel row.
      coding_rules: Must be enough for a human to recalculate.
      example: ''
    - name: transformation_confidence
      data_type: category
      required_level: required_for_promotion
      allowed_values: high | medium | low | blocked
      definition: Confidence in transformation.
      coding_rules: High only when source fields and formula are explicit.
      example: ''
    - name: prereg_status
      data_type: category
      required_level: conditional
      allowed_values: prereg_confirmed_pre_data | prereg_confirmed_pre_analysis | registered_report |
        proposal_pre_fielding_not_full_prereg | registry_metadata_only | registry_record_timing_not_audited
        | prereg_asserted_by_corpus_no_artifact | not_preregistered | unknown
      definition: Pre-registration status for confirmatory panels.
      coding_rules: Required for preregistered plots.
      example: ''
    - name: prereg_mapping_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Mapping row that links the represented study/result to its preregistration, registry
        record, PAP, MPAP, or registered-report protocol.
      coding_rules: Required for preregistered panels when a prereg/PAP relationship exists. Use source_source_mapping.mapping_id.
      example: map_aearctr_0000685_pap_to_good_politicians
    - name: prereg_source_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Source ID of the preregistration/PAP/registered-report protocol used for this result.
      coding_rules: Use the source that actually contains or asserts the preregistered selector.
      example: ''
    - name: prereg_url
      data_type: url
      required_level: conditional
      allowed_values: ''
      definition: Direct URL to preregistration/PAP/registered-report protocol.
      coding_rules: Prefer registry/PAP URL over a general article page.
      example: ''
    - name: prereg_registered_at
      data_type: date_or_datetime
      required_level: conditional
      allowed_values: ''
      definition: Registration, PAP filing, or Stage-1 acceptance date/time.
      coding_rules: Use ISO date/time when available; leave blank and add a problem if prereg timing is
        claimed but not dated.
      example: ''
    - name: prereg_timing
      data_type: category
      required_level: conditional
      allowed_values: pre_data_collection | pre_analysis | post_data_pre_results | post_results | not_applicable
        | unknown
      definition: Timing of the prereg/PAP relative to data/results.
      coding_rules: Must be specific, not just yes/no.
      example: pre_analysis
    - name: prereg_selector_locator
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Locator of the preregistered hypothesis/outcome/analysis rule.
      coding_rules: 'Examples: PAP p. 4 H1; registry primary_outcomes[2]; OSF file PAP.pdf section 2.1.'
      example: ''
    - name: prereg_selector_verbatim_text
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Verbatim preregistered selector text for the outcome/hypothesis/analysis rule.
      coding_rules: Required when a row is selected because it was preregistered. Do not summarize only.
      example: ''
    - name: prereg_hypothesis_id
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Preregistered hypothesis ID or label.
      coding_rules: 'Examples: H1a, Primary Outcome 1, MPAP family vote_choice.'
      example: ''
    - name: prereg_outcome_id
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Preregistered outcome ID or label.
      coding_rules: Use source-native ID if present.
      example: ''
    - name: selector_status
      data_type: category
      required_level: conditional
      allowed_values: pap_primary | pap_secondary | registry_primary | article_primary | first_confirmatory_hypothesis
        | median_across_preregistered_primaries | corpus_focal_claim | database_primary_outcome | not_focal
        | no_focal_selector
      definition: How focal result was selected.
      coding_rules: Required for paper-level/corpus-level rows.
      example: ''
    - name: selector_rule
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Rule used to pick/collapse this result from eligible results.
      coding_rules: 'Examples: PAP primary outcome; median across preregistered primary outcomes; first
        confirmatory result; database primary outcome.'
      example: ''
    - name: selector_mapping_id
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Mapping row that supports the focal-result selector when separate from prereg_mapping_id.
      coding_rules: Use when a corpus/database identifies a focal claim or when a paper maps PAP outcomes
        to final tables.
      example: ''
    - name: replication_mapping_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Mapping row that links this result/source to an original, replication, computational
        reproduction, or robustness target.
      coding_rules: Use source_source_mapping.mapping_id; required when replication status is asserted.
      example: ''
    - name: replication_role
      data_type: category
      required_level: conditional
      allowed_values: none | original_study | replication_study | computational_reproduction | robustness_check
        | corpus_replication_assertion | unknown
      definition: Role of this result in a replication/reproduction relationship.
      coding_rules: Do not use a boolean; specify whether this is original, replication, reproduction,
        robustness check, or corpus assertion.
      example: replication_study
    - name: replication_pair_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Stable ID joining original and replication results/papers.
      coding_rules: Required when original and replication dots are paired or compared.
      example: ''
    - name: replication_kind
      data_type: category
      required_level: conditional
      allowed_values: preregistration | pre_analysis_plan | meta_analysis_pre_analysis_plan | registered_report_stage1_protocol
        | registered_report_stage2_results | trial_registry_record | data_or_code_package | paper_supplement
        | direct_replication | conceptual_replication | computational_reproduction | robustness_reanalysis
        | extension_study | pilot_full_scale_pair | pooled_round_component | corpus_child_paper | database_child_result
        | citation_or_link_only | unknown
      definition: Kind of replication/reproduction relationship.
      coding_rules: Use the same controlled vocabulary as source_source_mapping.relationship_subtype.
      example: direct_replication
    - name: replication_target_claim
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Claim, hypothesis, or result that the replication/reproduction targets.
      coding_rules: Copy or closely preserve source wording where available.
      example: ''
    - name: source_mapping_ids
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Pipe-delimited source_source_mapping IDs relevant to this result.
      coding_rules: Use for corpus membership, database-result mapping, paper-package support, preregistration,
        replication, and publication links.
      example: ''
    - name: extraction_confidence
      data_type: category
      required_level: required
      allowed_values: high | medium | low | blocked
      definition: Confidence in extraction from source.
      coding_rules: Low if PDF/table parse is uncertain.
      example: ''
    - name: human_check_status
      data_type: category
      required_level: required
      allowed_values: source_cells_recovered | n_only_recovered | plot_summary_only | needs_pdf_check
        | needs_code_execution | verified_by_human
      definition: Human-check readiness.
      coding_rules: Must not call source cells recovered unless verbatim source evidence is present.
      example: ''
    - name: coding_status
      data_type: category
      required_level: required
      allowed_values: fully_coded | coded_with_schema_gaps | staged_native_metric | blocked_missing_d_or_n
        | blocked_access | excluded | duplicate_existing
      definition: Current row disposition.
      coding_rules: Rows can be staged or blocked without being plotted.
      example: ''
    - name: evidence_level
      data_type: integer
      required_level: required
      allowed_values: ''
      definition: Numeric provenance/evidence level from 0 to 7.
      coding_rules: 0 blocks the row; public plots should require at least 3; publication-grade paper
        claims should usually require at least 5.
      example: '3'
    - name: evidence_level_name
      data_type: category
      required_level: required
      allowed_values: unanchored_number | internal_trace_only | external_source_assertion | external_assertion_with_target_source
        | target_source_independently_grounded | original_source_obtained | original_number_extracted
        | recomputed_from_raw
      definition: Named provenance/evidence level.
      coding_rules: Use the seven-level ladder; do not treat corpus assertions as original-source extraction.
      example: external_assertion_with_target_source
    - name: target_acquisition_state
      data_type: category
      required_level: recommended
      allowed_values: unanchored | external_assertion_only | target_identity_known | target_located |
        source_object_mirrorable | source_object_mirrored | text_or_data_extracted
      definition: State of target identity/location/mirroring/acquisition.
      coding_rules: Located is not mirrored; mirrored is not verified.
      example: target_located
    - name: value_verification_state
      data_type: category
      required_level: recommended
      allowed_values: not_checked | corpus_assertion_only | source_object_obtained_not_parsed | text_or_data_extracted
        | value_bearing_source_text_found | d_n_verified_from_source
      definition: State of D/N or native value verification against source objects.
      coding_rules: Use corpus_assertion_only until original source text/data are checked.
      example: corpus_assertion_only
    - name: source_is_original
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether the extraction source is the original paper/registry/API/table for the represented
        result.
      coding_rules: False for corpus/database assertions about another paper.
      example: 'false'
    - name: number_verified_by_us
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether we directly verified/copied or recomputed the plotted number from original/authoritative
        source text/output.
      coding_rules: False when taking an external corpus's word for the represented paper's number.
      example: 'false'
    - name: represented_work_identified
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether the represented paper/trial/study has a durable identifier or high-confidence
        resolved source.
      coding_rules: True for DOI, PMID, PMCID, NCT, AEA/RIDIE/EGAP ID, Dataverse DOI, or high-confidence
        Crossref resolution.
      example: 'true'
    - name: source_is_external
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether the extraction source is an external real-world source rather than only our
        internal derived file.
      coding_rules: True for mirrored corpus/database/registry/paper/package sources; false for internal-only
        derived tables.
      example: 'true'
    - name: requires_manual_review
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether the row still needs human review before final promotion.
      coding_rules: True for low-confidence Crossref, source gaps, unresolved represented work, or unverified
        original-source numbers.
      example: 'true'
    - name: conversion_verified
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether the native-to-D/native transformation has been verified against source inputs.
      coding_rules: False if D is a proxy or inherited from corpus without original-source recalculation.
      example: 'false'
    - name: citation_status
      data_type: category
      required_level: required
      allowed_values: real_citation | generated_internal | missing
