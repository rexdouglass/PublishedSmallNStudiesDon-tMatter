PROVENANCE_DATABASE_TABLES_AND_SCHEMAS:
  status: generated_from_scripts_write_provenance_codebook_py
  purpose: Root-level, obvious schema index for the provenance database. It mirrors the formal codebook
    TSVs so humans and LLMs can find the tables and fields without digging through data/derived.
  pipeline_shape:
  - search_lead
  - source / source_access / source_file
  - source_source_mapping
  - source_result
  - canonical_result
  - plot_membership under plot_universe and plot_criterion
  root_level_files:
    tables_tsv: PROVENANCE_DATABASE_TABLES.tsv
    fields_tsv: PROVENANCE_DATABASE_FIELDS.tsv
    schemas_yml: PROVENANCE_DATABASE_TABLES_AND_SCHEMAS.yml
    human_readable_md: PROVENANCE_DATABASE_TABLES_AND_SCHEMAS.md
  derived_machine_files:
    tables_tsv: data/derived/effect_inflation_dataset/provenance_codebook.tsv
    fields_tsv: data/derived/effect_inflation_dataset/provenance_data_dictionary.tsv
    vocabulary_tsv: data/derived/effect_inflation_dataset/provenance_vocab_dictionary.tsv
    empty_templates_dir: data/derived/effect_inflation_dataset/schema_templates
  tables:
  - table_name: source.tsv
    grain: One citeable or computational source object.
    primary_key: source_id
    required_for_promotion: Required for every promoted source-result row.
    description: Papers, registry records, corpora, databases, repositories, PDFs, reports, raw files,
      and derived source tables.
    columns:
    - name: source_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable unique source ID.
      coding_rules: Prefix by source type when useful; do not recycle IDs.
      example: src_ctgov_kg
    - name: source_type
      data_type: category
      required_level: required
      allowed_values: paper | registry_record | corpus | database | repository_or_package | pdf | report
        | website | raw_data_file | code_file | local_derived_table | other
      definition: Kind of source object.
      coding_rules: Use the narrowest true object type.
      example: database
    - name: title
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Human-readable title of the source.
      coding_rules: Use source title, registry title, repository title, or file title.
      example: ''
    - name: citation_key
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: BibTeX key for this source.
      coding_rules: Blank only when no real bibliographic source exists. Never use generated dot keys
        as represented-source citations.
      example: ''
    - name: citation_rendered
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Rendered citation text copied from the bibliography process.
      coding_rules: Keep even when a BibTeX split later changes.
      example: ''
    - name: bibtex_file
      data_type: path
      required_level: conditional
      allowed_values: ''
      definition: Repo-relative path to the BibTeX file containing citation_key.
      coding_rules: Usually docs/references.bib or plot_dot_references.bib.
      example: ''
    - name: doi
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Digital Object Identifier if available.
      coding_rules: Normalize without https://doi.org/ when possible.
      example: ''
    - name: pmid
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: PubMed ID if available.
      coding_rules: Use numeric PMID only.
      example: ''
    - name: registry_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Registry identifier such as NCT, AEARCTR, EGAP, RIDIE, OSF.
      coding_rules: Required for registry records.
      example: ''
    - name: url
      data_type: url
      required_level: recommended
      allowed_values: ''
      definition: Stable landing URL.
      coding_rules: Prefer DOI, registry, repository, or official landing page.
      example: ''
    - name: publication_year
      data_type: integer
      required_level: optional
      allowed_values: ''
      definition: Publication or release year.
      coding_rules: Leave blank if unknown.
      example: ''
    - name: source_status
      data_type: category
      required_level: required
      allowed_values: primary | sidecar | support_only | blocked | deprecated
      definition: Role of this source in the dataset.
      coding_rules: Use primary for sources that can support extraction rows.
      example: primary
    - name: notes
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Concise source-level notes.
      coding_rules: Do not store result extraction details here; use source_result/extraction_event.
      example: ''
  - table_name: source_access.tsv
    grain: One route to the bytes for one source.
    primary_key: access_id
    required_for_promotion: Required unless the source is intentionally bibliographic-only and not used
      for extraction.
    description: Direct URL/API/local path/checksum/access status records.
    columns:
    - name: access_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable unique access ID.
      coding_rules: One source can have multiple access rows.
      example: ''
    - name: source_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Foreign key to source.tsv.
      coding_rules: Must match source.source_id.
      example: ''
    - name: access_role
      data_type: category
      required_level: required
      allowed_values: landing_page | direct_download | api | mirrored_file | file_member | source_file_or_catalog
        | user_upload | derived_table
      definition: Role of this access route.
      coding_rules: Use file_member for files inside archives.
      example: direct_download
    - name: remote_url
      data_type: url
      required_level: conditional
      allowed_values: ''
      definition: Direct web URL when available.
      coding_rules: Prefer direct file/API URL over landing page when it can reproduce bytes.
      example: ''
    - name: api_url
      data_type: url
      required_level: optional
      allowed_values: ''
      definition: API URL used to fetch metadata or files.
      coding_rules: Use when data came from API rather than browser.
      example: ''
    - name: final_url
      data_type: url
      required_level: optional
      allowed_values: ''
      definition: Final URL after redirects.
      coding_rules: Keep distinct from remote_url so DOI/publisher redirect chains remain auditable.
      example: ''
    - name: http_status
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: HTTP status code or API status from retrieval attempt.
      coding_rules: Use numeric HTTP status when available; leave blank for local-only files.
      example: ''
    - name: redirect_chain
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Redirect chain observed during acquisition.
      coding_rules: Use pipe-delimited URLs or compact JSON; keep TSV-safe.
      example: ''
    - name: host
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Host/domain of final retrieval route.
      coding_rules: Useful for per-host retry, policy, and blocker audits.
      example: ''
    - name: local_path
      data_type: path
      required_level: conditional
      allowed_values: ''
      definition: Repo-relative local mirror path.
      coding_rules: Required when file is mirrored locally.
      example: ''
    - name: file_member_path
      data_type: path
      required_level: conditional
      allowed_values: ''
      definition: Path of a file inside a zip/tar/repository.
      coding_rules: Use for archive members or package internal files.
      example: ''
    - name: content_type
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: File or response type.
      coding_rules: 'Examples: csv, tsv, pdf, zip, html, json, dta, rds.'
      example: ''
    - name: file_sha256
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: SHA-256 checksum of local file.
      coding_rules: Required for mirrored files unless impractical.
      example: ''
    - name: file_size_bytes
      data_type: integer
      required_level: conditional
      allowed_values: ''
      definition: Size of local file.
      coding_rules: Required for mirrored files unless impractical.
      example: ''
    - name: retrieved_at
      data_type: datetime
      required_level: recommended
      allowed_values: ''
      definition: ISO date/time of retrieval.
      coding_rules: Use local current date if exact timestamp unavailable.
      example: ''
    - name: retrieved_by
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Who or what retrieved the file.
      coding_rules: Use codex, user, script name, or unknown.
      example: ''
    - name: retrieval_method
      data_type: category
      required_level: required
      allowed_values: automated_download | api_download | osf_clone | dataverse_api | github_clone | user_upload
        | browser_manual_download | existing_local_file | code_execution_output | not_retrieved
      definition: How bytes were obtained.
      coding_rules: Record manual downloads honestly.
      example: automated_download
    - name: access_status
      data_type: category
      required_level: required
      allowed_values: local_file_found | downloaded | remote_url_not_cached | local_path_missing | login_required
        | access_denied | missing_locator | unresolved_locator | blocked | not_applicable
      definition: Whether the access path is usable.
      coding_rules: Blocked/gated sources still get rows.
      example: local_file_found
    - name: access_strategy
      data_type: category
      required_level: recommended
      allowed_values: registry_clinicaltrials | pubmed_bridge | pmc_fulltext | crossref_metadata | datacite_metadata
        | unpaywall_metadata | openalex_metadata | semantic_scholar_metadata | europepmc_metadata | oa_candidate_url
        | preprint_repository_candidate | direct_journal_or_doi_landing | stable_url | other
      definition: Resolver or acquisition route tried for this access row.
      coding_rules: Keep direct journal, OA candidate, preprint/repository, registry, and metadata routes
        separate.
      example: preprint_repository_candidate
    - name: source_byte_class
      data_type: category
      required_level: recommended
      allowed_values: full_article_pdf | full_article_xml | full_article_html | author_manuscript_fulltext
        | supplement_file | dataset_file | code_file | registry_record_full | pmc_fulltext_xml | pubmed_record_or_abstract
        | metadata_record | publisher_landing_or_abstract | paywall_or_login_page | captcha_page | access_denied_page
        | blocked_no_source_object | source_object_unclassified | not_retrieved
      definition: Class of bytes or artifact obtained.
      coding_rules: Do not count metadata, abstract pages, paywall pages, CAPTCHA pages, or access-denied
        pages as level 5 unless the plotted value is present on that page.
      example: publisher_landing_or_abstract
    - name: level5_eligible
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether this access object can qualify as strict level 5 after identity review.
      coding_rules: True only for value-bearing source objects such as full article, registry record,
        supplement, data/code, or repository manuscript.
      example: 'false'
    - name: license_url
      data_type: url
      required_level: optional
      allowed_values: ''
      definition: URL or source of license/reuse information.
      coding_rules: Use license links from Crossref, repository metadata, PMC, publisher pages, or data
        package metadata.
      example: ''
    - name: license_category
      data_type: category
      required_level: recommended
      allowed_values: open | restricted | subscription | unknown | not_applicable
      definition: Coarse access/reuse category.
      coding_rules: Use open only when mirroring/reuse appears allowed; otherwise use restricted, subscription,
        unknown, or not_applicable.
      example: unknown
    - name: storage_allowed
      data_type: boolean_or_unknown
      required_level: recommended
      allowed_values: ''
      definition: Whether local storage/mirroring is allowed for project use.
      coding_rules: Use true/false/unknown; do not infer true from successful download alone.
      example: unknown
    - name: source_version
      data_type: category
      required_level: recommended
      allowed_values: version_of_record | accepted_manuscript | author_manuscript | preprint | supplement
        | registry_record | dataset | code | metadata | unknown
      definition: Version/class of the retrieved object.
      coding_rules: Distinguish VOR, accepted manuscript, preprint, registry record, supplement, dataset,
        code, and metadata.
      example: version_of_record
    - name: retrieval_policy_notes
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Notes on rate limits, TDM policy, license limits, or manual access constraints.
      coding_rules: Keep policy facts here; detailed attempts belong in extraction_event.
      example: ''
    - name: abstract_or_detail_text
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Short abstract, title, description, registry summary, or landing-page detail extracted
        during acquisition.
      coding_rules: Grounding evidence only; do not treat as original-number verification unless it contains
        the exact plotted value.
      example: Publisher abstract captured from paywalled DOI page.
    - name: abstract_or_detail_source_url
      data_type: url
      required_level: optional
      allowed_values: ''
      definition: URL from which abstract_or_detail_text was extracted.
      coding_rules: Use the final URL after redirects when available.
      example: ''
    - name: paywall_or_login_seen
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether this route returned a paywall or login artifact.
      coding_rules: Use with access_barrier and extraction_problem for manual follow-up.
      example: 'true'
    - name: captcha_or_bot_block_seen
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether this route triggered a CAPTCHA or bot-check artifact.
      coding_rules: Stop automated retries for that host/object and record as blocked.
      example: 'false'
    - name: preprint_or_repository_candidate
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether this route was a preprint, author manuscript, repository, or institutional archive
        candidate.
      coding_rules: Usually discovered through OpenAlex, Semantic Scholar, Unpaywall, Crossref, Europe
        PMC, or repository metadata.
      example: 'true'
    - name: access_barrier
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Barrier if not locally accessible.
      coding_rules: 'Examples: login, license, JS-only, 403, missing file.'
      example: ''
    - name: access_notes
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Extra access details.
      coding_rules: Keep concise; use extraction_event for procedural details.
      example: ''
  - table_name: source_access_attempt.tsv
    grain: One resolver/download/API attempt for one source.
    primary_key: attempt_id
    required_for_promotion: Recommended for all newly resolved sources; required when a source required
      multiple routes, paywall/CAPTCHA handling, or OA/preprint discovery.
    description: Append-only acquisition attempts for DOI landing pages, OpenAlex/Unpaywall/Semantic Scholar
      candidates, PubMed/PMC bridges, registry APIs, repository files, paywalls, abstracts, and failures.
    columns:
    - name: attempt_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable unique attempt ID.
      coding_rules: One row per resolver/API/download attempt or cache hit.
      example: ''
    - name: source_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Foreign key to source.tsv.
      coding_rules: The source being resolved or acquired.
      example: ''
    - name: access_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Foreign key to source_access.tsv when the attempt produced or checked a source access
        row.
      coding_rules: Leave blank only for rejected candidates not represented in source_access.
      example: ''
    - name: attempt_group_id
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: ID grouping attempts for one resolver pass/source target.
      coding_rules: Use to connect Crossref/OpenAlex/Unpaywall/etc. fanout for one source.
      example: ''
    - name: attempt_order
      data_type: integer
      required_level: recommended
      allowed_values: ''
      definition: Order of this attempt within the source resolver chain.
      coding_rules: Start at 1 for each source when possible.
      example: ''
    - name: resolver_name
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Resolver/plugin name.
      coding_rules: 'Examples: crossref_metadata, openalex_work, unpaywall_doi, pmc_oa.'
      example: ''
    - name: resolver_version
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Resolver/plugin version or code commit.
      coding_rules: Keep stable enough to reproduce route behavior.
      example: ''
    - name: resolver_strategy
      data_type: category
      required_level: required
      allowed_values: registry_clinicaltrials | pubmed_bridge | pmc_fulltext | crossref_metadata | datacite_metadata
        | unpaywall_metadata | openalex_metadata | semantic_scholar_metadata | europepmc_metadata | oa_candidate_url
        | preprint_repository_candidate | direct_journal_or_doi_landing | stable_url | other
      definition: Resolver/acquisition strategy tried.
      coding_rules: Use the same controlled vocabulary as source_access.access_strategy.
      example: openalex_metadata
    - name: candidate_rank
      data_type: integer
      required_level: optional
      allowed_values: ''
      definition: Rank of candidate within resolver output.
      coding_rules: Use 1 for top candidate after ranking.
      example: ''
    - name: candidate_rank_reason
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Why this candidate was ranked here.
      coding_rules: Use match scores, route priority, and license/source-object class.
      example: ''
    - name: candidate_url
      data_type: url
      required_level: conditional
      allowed_values: ''
      definition: Candidate URL requested or considered.
      coding_rules: Use DOI/API/OA/preprint/repository URL as attempted.
      example: ''
    - name: candidate_url_source
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Where the candidate URL came from.
      coding_rules: 'Examples: Crossref link, OpenAlex best_oa_location, Unpaywall oa_location, manual.'
      example: ''
    - name: final_url
      data_type: url
      required_level: optional
      allowed_values: ''
      definition: Final URL after redirects.
      coding_rules: Keep paywall/landing-page final URL for blockers.
      example: ''
    - name: host
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Host/domain reached.
      coding_rules: Useful for per-host policies and blockers.
      example: ''
    - name: method
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: HTTP/API/file method.
      coding_rules: 'Examples: GET, API JSON, local_file_check.'
      example: ''
    - name: http_status
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: HTTP/API status code.
      coding_rules: Leave blank for local-only checks.
      example: ''
    - name: redirect_chain
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Redirect chain observed for this attempt.
      coding_rules: Use compact JSON or pipe-delimited URLs.
      example: ''
    - name: cache_key
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Cache key for this request or candidate.
      coding_rules: Use deterministic key based on method, canonical URL, and resolver version.
      example: ''
    - name: cache_hit_yn
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether this attempt used cached data.
      coding_rules: Use true/false.
      example: ''
    - name: retry_count
      data_type: integer
      required_level: optional
      allowed_values: ''
      definition: Number of retries for this attempt.
      coding_rules: Use 0 for first successful/terminal attempt.
      example: ''
    - name: retry_after_seconds
      data_type: number
      required_level: optional
      allowed_values: ''
      definition: Retry-After delay if returned by host.
      coding_rules: Store header value when available.
      example: ''
    - name: content_type_header
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Raw content-type header if known.
      coding_rules: Use exact header when available.
      example: ''
    - name: content_type_sniffed
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Content type inferred from bytes, file extension, or classifier.
      coding_rules: 'Examples: pdf, html, json, csv.'
      example: ''
    - name: byte_count
      data_type: integer
      required_level: optional
      allowed_values: ''
      definition: Number of bytes obtained.
      coding_rules: Use local file size where known.
      example: ''
    - name: sha256
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: SHA-256 checksum for bytes obtained.
      coding_rules: Required when mirrored bytes are kept and practical.
      example: ''
    - name: local_path
      data_type: path
      required_level: conditional
      allowed_values: ''
      definition: Repo-relative local mirror path produced or checked by this attempt.
      coding_rules: Leave blank for metadata-only unresolved candidates.
      example: ''
    - name: source_byte_class
      data_type: category
      required_level: recommended
      allowed_values: full_article_pdf | full_article_xml | full_article_html | author_manuscript_fulltext
        | supplement_file | dataset_file | code_file | registry_record_full | pmc_fulltext_xml | pubmed_record_or_abstract
        | metadata_record | publisher_landing_or_abstract | paywall_or_login_page | captcha_page | access_denied_page
        | blocked_no_source_object | source_object_unclassified | not_retrieved
      definition: Class of bytes/artifact obtained by this attempt.
      coding_rules: Use paywall/abstract/metadata classes honestly.
      example: metadata_record
    - name: access_status
      data_type: category
      required_level: required
      allowed_values: local_file_found | downloaded | remote_url_not_cached | local_path_missing | login_required
        | access_denied | missing_locator | unresolved_locator | blocked | not_applicable
      definition: Usability status of this attempt.
      coding_rules: Use blocked/access_denied/login_required rather than overwriting with success.
      example: downloaded
    - name: access_barrier
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Barrier hit by this attempt.
      coding_rules: 'Examples: paywall, login, captcha, 403, no_oa_copy, missing_api_key.'
      example: ''
    - name: abstract_or_detail_text
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Abstract/detail/title/description text captured from this route.
      coding_rules: Grounding text only unless it contains the exact coded value.
      example: ''
    - name: paywall_or_login_seen
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether this attempt hit a paywall/login artifact.
      coding_rules: Use true for publisher paywalls and sign-in pages.
      example: 'false'
    - name: captcha_or_bot_block_seen
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether this attempt hit a CAPTCHA/bot-check artifact.
      coding_rules: Stop automated retries for that route.
      example: 'false'
    - name: preprint_or_repository_candidate
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether the attempted URL is a preprint/repository/manuscript candidate.
      coding_rules: Typically discovered via OpenAlex, Unpaywall, Semantic Scholar, Europe PMC, or manual
        search.
      example: 'true'
    - name: license_url
      data_type: url
      required_level: optional
      allowed_values: ''
      definition: License or reuse-policy URL discovered for this attempt.
      coding_rules: Use repository/publisher/API license when available.
      example: ''
    - name: license_category
      data_type: category
      required_level: recommended
      allowed_values: open | restricted | subscription | unknown | not_applicable
      definition: Coarse license/access category for this attempt.
      coding_rules: Use unknown when not assessed.
      example: unknown
    - name: storage_allowed
      data_type: boolean_or_unknown
      required_level: recommended
      allowed_values: ''
      definition: Whether this attempt's bytes may be stored locally.
      coding_rules: Use unknown unless policy is clear.
      example: ''
    - name: robots_status
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: robots.txt or crawl-policy status for this candidate.
      coding_rules: 'Examples: allowed, disallowed, unknown, not_checked.'
      example: ''
    - name: tdm_policy_status
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: TDM policy status observed for host/route.
      coding_rules: 'Examples: allowed, restricted, subscription_required, unknown.'
      example: ''
    - name: title_match_score
      data_type: number
      required_level: optional
      allowed_values: ''
      definition: Similarity score between candidate title and target title.
      coding_rules: Use 0-1 when available.
      example: ''
    - name: doi_match_score
      data_type: number
      required_level: optional
      allowed_values: ''
      definition: DOI/identifier match score.
      coding_rules: Use 1 for exact DOI match, 0 for mismatch, blank if not checked.
      example: ''
    - name: author_year_match_score
      data_type: number
      required_level: optional
      allowed_values: ''
      definition: Author/year match score.
      coding_rules: Use 0-1 when available.
      example: ''
    - name: identity_decision
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Candidate identity decision.
      coding_rules: 'Examples: accepted_exact_doi, accepted_title_year, rejected_mismatch, needs_review.'
      example: ''
    - name: identity_decision_reason
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Reason for candidate identity decision.
      coding_rules: Record mismatch or confidence basis.
      example: ''
    - name: retrieval_method
      data_type: category
      required_level: required
