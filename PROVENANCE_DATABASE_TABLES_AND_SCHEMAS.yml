      coding_rules: Every child/member must be an explicit source_result row.
      example: ''
    - name: membership_role
      data_type: category
      required_level: required
      allowed_values: preferred | child | excluded_child | duplicate | sensitivity_only
      definition: Role of the source-result in the canonical result.
      coding_rules: Use preferred for the preferred direct source, child for included child rows, excluded_child
        for rejected candidates, duplicate for duplicates, sensitivity_only for sensitivity rows.
      example: preferred
    - name: included_in_collapse
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether this source-result contributed to min/median/max/preferred collapse.
      coding_rules: Use false for duplicate, excluded, or sensitivity-only rows.
