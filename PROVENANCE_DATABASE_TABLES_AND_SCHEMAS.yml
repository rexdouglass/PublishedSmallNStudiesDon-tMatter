    required_for_promotion: Required whenever extraction source and represented source differ, or for
      corpus-parent mappings.
    description: Relationships such as corpus contains paper, database reports paper result, registry
      preregisters study.
    columns:
    - name: mapping_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable relationship ID.
      coding_rules: One directed relationship per row.
      example: ''
    - name: from_source_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Source ID for parent/asserting/deriving source.
      coding_rules: Must match source.tsv.
      example: ''
    - name: to_source_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Source ID for child/represented/derived-from source.
      coding_rules: Must match source.tsv.
      example: ''
    - name: relationship_type
      data_type: category
      required_level: required
      allowed_values: extraction_source_reports_result_for_represented_source | corpus_contains_paper
        | database_reports_paper_result | repository_supports_paper | registry_preregisters_study | registry_links_publication
        | pre_analysis_plan_supports_study | registered_report_protocol_for_paper | publication_reports_registered_study
        | replication_of | computational_reproduction_of | robustness_reanalysis_of | meta_analysis_includes_study
        | corpus_asserts_result_for_paper | corpus_asserts_preregistration_for_paper | paper_uses_dataset
        | source_derives_from_source | duplicate_of | parent_collection_contains_child
      definition: Relationship between sources.
      coding_rules: Use controlled vocabulary.
      example: ''
    - name: relationship_subtype
      data_type: category
      required_level: recommended
      allowed_values: preregistration | pre_analysis_plan | meta_analysis_pre_analysis_plan | registered_report_stage1_protocol
        | registered_report_stage2_results | trial_registry_record | data_or_code_package | paper_supplement
        | direct_replication | conceptual_replication | computational_reproduction | robustness_reanalysis
        | extension_study | pilot_full_scale_pair | pooled_round_component | corpus_child_paper | database_child_result
        | citation_or_link_only | unknown
      definition: Specific relationship subtype.
      coding_rules: Use this to distinguish direct replication, conceptual replication, PAP, MPAP, registered
        report protocol, corpus child paper, package support, etc.
      example: pre_analysis_plan
    - name: mapping_assertion_source_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Source that asserts or documents this relationship.
      coding_rules: 'Can equal from_source_id, but do not assume. Example: a corpus asserts Paper B reports
        Paper A; a registry page links final publication.'
      example: ''
    - name: mapping_assertion_access_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Access row for the file/page/API response where this relationship was observed.
      coding_rules: Use source_access.access_id when available.
      example: ''
    - name: mapping_assertion_locator
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Locator inside the assertion source.
      coding_rules: 'Examples: CSV row ID, registry field paper_url, PAP p. 3, OSF file list, article
        footnote.'
      example: ''
    - name: mapping_assertion_url
      data_type: url
      required_level: conditional
      allowed_values: ''
      definition: Most direct URL documenting the relationship.
      coding_rules: Use direct registry, DOI, OSF, Dataverse, package, corpus row, or article URL.
      example: ''
    - name: mapping_assertion_verbatim_text
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Verbatim text/field that asserts the relationship.
      coding_rules: Required when the relation is not obvious from source IDs alone; one-line TSV-safe.
      example: ''
    - name: mapping_evidence_type
      data_type: category
      required_level: recommended
      allowed_values: verbatim_text | metadata_field | doi_link | registry_link | citation_match | title_author_year_match
        | code_or_package_manifest | manual_judgment | unknown
      definition: Type of evidence used to assert the mapping.
      coding_rules: Prefer verbatim_text or metadata_field over manual_judgment when possible.
      example: metadata_field
    - name: external_relationship_id
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: External ID for the relationship.
      coding_rules: 'Examples: AEARCTR-0000685, NCT ID, OSF registration GUID, SCORE claim ID, Metaketa
        project ID.'
      example: ''
    - name: external_relationship_url
      data_type: url
      required_level: optional
      allowed_values: ''
      definition: External URL for the relationship or mapping record.
      coding_rules: Use when different from mapping_assertion_url.
      example: ''
    - name: relationship_date
      data_type: date_or_datetime
      required_level: optional
      allowed_values: ''
      definition: Primary relationship date.
      coding_rules: For preregistration this is filing/registration date; for replication this can be
        replication publication/registration date.
      example: ''
    - name: relationship_updated_at
      data_type: date_or_datetime
      required_level: optional
      allowed_values: ''
      definition: Update, amendment, or version date.
      coding_rules: Use for registry updates, PAP amendments, OSF version timestamps, package versions.
      example: ''
    - name: relationship_timing
      data_type: category
      required_level: conditional
      allowed_values: pre_data_collection | pre_analysis | post_data_pre_results | post_results | not_applicable
        | unknown
      definition: Timing of this relationship relative to data collection/analysis/results.
      coding_rules: Required for preregistration and registered-report mappings.
      example: pre_data_collection
    - name: prereg_registry_name
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Registry or preregistration platform name.
      coding_rules: 'Examples: AEA RCT Registry, EGAP, OSF Registries, ClinicalTrials.gov, RIDIE.'
      example: ''
    - name: prereg_registration_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Registry/PAP/registered-report identifier.
      coding_rules: 'Examples: AEARCTR-0000685, EGAP registration/736, NCT02818036, OSF GUID.'
      example: ''
    - name: prereg_document_type
      data_type: category_or_string
      required_level: conditional
      allowed_values: ''
      definition: Specific preregistration document type.
      coding_rules: 'Examples: registry_metadata, PAP, MPAP, Stage 1 registered report, protocol, amendment.'
      example: ''
    - name: prereg_primary_outcome_text
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Verbatim primary outcome/family text from preregistration/PAP.
      coding_rules: Use when the mapping supports a focal selector.
      example: ''
    - name: prereg_hypothesis_text
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Verbatim hypothesis text from preregistration/PAP.
      coding_rules: Use when available; do not replace with article wording.
      example: ''
    - name: replication_kind
      data_type: category
      required_level: conditional
      allowed_values: preregistration | pre_analysis_plan | meta_analysis_pre_analysis_plan | registered_report_stage1_protocol
        | registered_report_stage2_results | trial_registry_record | data_or_code_package | paper_supplement
        | direct_replication | conceptual_replication | computational_reproduction | robustness_reanalysis
        | extension_study | pilot_full_scale_pair | pooled_round_component | corpus_child_paper | database_child_result
        | citation_or_link_only | unknown
      definition: Specific replication/reproduction type.
      coding_rules: Required when relationship_type is replication_of, computational_reproduction_of,
        or robustness_reanalysis_of.
      example: direct_replication
    - name: replication_target_claim
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Claim/result/hypothesis being replicated or reproduced.
      coding_rules: Copy source wording when available.
      example: ''
    - name: replication_original_result_id
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Original source_result_id targeted by the replication.
      coding_rules: Fill when original result row exists in source_result.tsv.
      example: ''
    - name: replication_replicating_result_id
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Replication/reproduction source_result_id.
      coding_rules: Fill when replication result row exists in source_result.tsv.
      example: ''
    - name: replication_outcome_match
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: How closely the replication outcome matches the original.
      coding_rules: 'Examples: identical measure, same construct, different operationalization, unknown.'
      example: ''
    - name: replication_sample_relation
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: How replication sample relates to original.
      coding_rules: 'Examples: independent sample, same data recomputed, subset, extension sample, unknown.'
      example: ''
    - name: replication_design_relation
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: How replication design relates to original.
      coding_rules: 'Examples: same design, close protocol, conceptual extension, computational rerun,
        robustness specification.'
      example: ''
    - name: collection_role
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Role in a corpus/collection mapping.
      coding_rules: 'Examples: parent corpus, child paper, child result, pooled round, component study.'
      example: ''
    - name: dedupe_group_id
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Group ID for sources/results that should not be double-counted together.
      coding_rules: Use for pooled/component Metaketa rows, corpus-child rows, and original/replication
        pair families.
      example: ''
    - name: relationship_confidence
      data_type: category
      required_level: required
      allowed_values: high | medium | low | blocked
      definition: Confidence in relationship.
      coding_rules: Use blocked only when relation is suspected but unverified.
      example: ''
    - name: notes
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Relationship notes.
      coding_rules: Keep concise.
      example: ''
  - table_name: extraction_event.tsv
    grain: One action or failed action used to obtain, parse, or verify source bytes.
    primary_key: event_id
    required_for_promotion: Required for new extraction work; pilot retrace rows may have partial historical
      events.
    description: Downloads, user uploads, unzip steps, API calls, table extraction, code execution, manual
      PDF checks, blocked access.
    columns:
    - name: event_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable event ID.
      coding_rules: One extraction/retrieval/check action.
      example: ''
    - name: source_result_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Source-result affected by event.
      coding_rules: Blank only for source-level access events.
      example: ''
    - name: access_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Access row involved.
      coding_rules: Required for download/mirror events.
      example: ''
    - name: event_step
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Step name.
      coding_rules: 'Examples: download, unzip, parse_table, run_script, manual_pdf_check, blocked_login.'
      example: ''
    - name: timestamp
      data_type: datetime
      required_level: recommended
      allowed_values: ''
      definition: ISO timestamp/date.
      coding_rules: At least YYYY-MM-DD.
      example: ''
    - name: performed_by
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Actor/tool.
      coding_rules: 'Examples: codex, user, script name.'
      example: ''
    - name: command_or_tool
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Command, script, API client, or manual action.
      coding_rules: Include enough to repeat when practical.
      example: ''
    - name: path
      data_type: path
      required_level: conditional
      allowed_values: ''
      definition: Path touched by event.
      coding_rules: Repo-relative where possible.
      example: ''
    - name: path_exists
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether path existed at check time.
      coding_rules: Use true/false.
      example: ''
    - name: file_size_bytes
      data_type: integer
      required_level: conditional
      allowed_values: ''
      definition: File size after event.
      coding_rules: Required for downloaded/mirrored files.
      example: ''
    - name: file_sha256
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Checksum after event.
      coding_rules: Required for downloaded/mirrored files.
      example: ''
    - name: status
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Outcome of event.
      coding_rules: 'Examples: found, downloaded, parsed, failed, blocked.'
      example: ''
    - name: match_method
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: How a source row was matched.
      coding_rules: 'Examples: DOI exact, NCT_ID + outcome title, title + D/N.'
      example: ''
    - name: notes
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Event details.
      coding_rules: For failures, state exact blocker.
      example: ''
  - table_name: extraction_problem.tsv
    grain: One quality or provenance problem for one source-result or source object.
    primary_key: problem_id
    required_for_promotion: Required when any promotion gate is not met or requires manual follow-up.
    description: Machine-actionable error and rework queue.
    columns:
    - name: problem_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable problem ID.
      coding_rules: One problem per row.
      example: ''
    - name: source_result_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Affected source-result row.
      coding_rules: Blank only for source-level problems.
      example: ''
    - name: table_name
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Table containing problem.
      coding_rules: Use codebook table name.
      example: ''
    - name: column_name
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Column containing problem.
      coding_rules: Use when field-specific.
      example: ''
    - name: problem_code
      data_type: category
      required_level: required
      allowed_values: missing_verbatim_effect_text | missing_verbatim_n_text | missing_source_locator
        | source_is_derived_not_original_text | access_blocked | needs_pdf_check | needs_code_execution
        | conversion_not_defensible | duplicate_needs_resolution | missing_bibliographic_key
      definition: Machine-actionable problem code.
      coding_rules: Use controlled vocabulary.
      example: ''
    - name: severity
      data_type: category
      required_level: required
      allowed_values: high | medium | low
      definition: Severity.
      coding_rules: High blocks promotion.
      example: ''
    - name: detail
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Human-readable issue.
      coding_rules: State what is missing or ambiguous.
      example: ''
    - name: suggested_rework
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: How to fix.
      coding_rules: Give URL/path/action if known.
      example: ''
    - name: resolved
      data_type: boolean
      required_level: required
      allowed_values: ''
      definition: Whether problem is resolved.
      coding_rules: Use false until fixed.
      example: ''
    - name: resolved_by
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Who resolved it.
      coding_rules: Required if resolved=true.
      example: ''
    - name: resolved_at
      data_type: datetime
      required_level: conditional
      allowed_values: ''
      definition: Resolution date/time.
      coding_rules: Required if resolved=true.
      example: ''
  - table_name: manual_acquisition_task.tsv
    grain: One human/manual acquisition or verification task.
    primary_key: manual_task_id
    required_for_promotion: Required when automated acquisition fails or manual/library access is needed.
    description: Prioritized human workflow for missing source objects, PDFs, supplements, prereg artifacts,
      result text, and license/access review.
    columns:
    - name: manual_task_id
      data_type: string
      required_level: required
      allowed_values: ''
      definition: Stable manual task ID.
      coding_rules: One row per human acquisition/review task.
      example: ''
    - name: source_result_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Source-result needing manual work.
      coding_rules: Blank only for source-level tasks.
      example: ''
    - name: canonical_result_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Canonical result affected by task.
      coding_rules: Use when task affects a plotted/statistical dot.
      example: ''
    - name: represented_source_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Represented source requiring acquisition.
      coding_rules: Use source_result.represented_source_id when available.
      example: ''
    - name: extraction_source_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Current extraction source.
      coding_rules: Use source_result.extraction_source_id when relevant.
      example: ''
    - name: needed_artifact_type
      data_type: category
      required_level: required
      allowed_values: original_source_object | full_article | registry_record | supplement | dataset_or_code
        | prereg_artifact | replication_evidence | effect_text | n_text | license_review | identity_disambiguation
        | other
      definition: Artifact/review type needed.
      coding_rules: Use the narrowest missing item.
      example: original_source_object
    - name: needed_value_fields
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Fields needed from manual work.
      coding_rules: 'Examples: effect_text|n_text|source_object|license_review.'
      example: ''
    - name: priority_score
      data_type: number
      required_level: recommended
      allowed_values: ''
      definition: Priority score for manual queue.
      coding_rules: Higher means more useful/tractable.
      example: ''
    - name: priority_reason
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Why this task has this priority.
      coding_rules: Use evidence level, plot membership, identifiers, and likely upgrade value.
      example: ''
    - name: failed_route_summary
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Summary of automated routes already tried.
      coding_rules: Use source_access_attempt decisions and extraction problems.
      example: ''
    - name: best_candidate_urls
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Candidate URLs for human to try.
      coding_rules: Pipe-delimit DOI/registry/repository/publisher URLs.
      example: ''
    - name: acceptable_manual_routes
      data_type: string
      required_level: recommended
      allowed_values: ''
      definition: Allowed manual routes.
      coding_rules: 'Examples: library access, repository request, author manuscript search, PDF parse.'
      example: ''
    - name: library_access_needed_yn
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether library/institutional access may be needed.
      coding_rules: Use true/false/unknown when possible.
      example: ''
    - name: ill_needed_yn
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether interlibrary loan may be needed.
      coding_rules: Use true/false.
      example: ''
    - name: author_contact_needed_yn
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether author contact may be needed.
      coding_rules: Use true/false.
      example: ''
    - name: repository_access_request_needed_yn
      data_type: boolean
      required_level: recommended
      allowed_values: ''
      definition: Whether repository access request may be needed.
      coding_rules: Use true/false.
      example: ''
    - name: assigned_to
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Human/task owner.
      coding_rules: Blank until assigned.
      example: ''
    - name: status
      data_type: category
      required_level: required
      allowed_values: open | in_progress | blocked | closed | not_needed
      definition: Manual task status.
      coding_rules: Use open until completed or ruled out.
      example: open
    - name: opened_at
      data_type: datetime
      required_level: recommended
      allowed_values: ''
      definition: Task creation timestamp/date.
      coding_rules: Use batch timestamp.
      example: ''
    - name: closed_at
      data_type: datetime
      required_level: conditional
      allowed_values: ''
      definition: Task close timestamp/date.
      coding_rules: Required if status=closed.
      example: ''
    - name: human_outcome
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Outcome after human work.
      coding_rules: 'Examples: pdf_downloaded, paywalled, no_source_found, value_verified.'
      example: ''
    - name: created_source_file_id
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Source file created by manual work.
      coding_rules: Foreign key to source_file.tsv when available.
      example: ''
    - name: created_support_ids
      data_type: string
      required_level: conditional
      allowed_values: ''
      definition: Support rows created by manual work.
      coding_rules: Pipe-delimit source_result_support IDs if introduced later.
      example: ''
    - name: manual_notes
      data_type: string
      required_level: optional
      allowed_values: ''
      definition: Manual task notes.
      coding_rules: Keep concise, actionable, and safe to share.
      example: ''
