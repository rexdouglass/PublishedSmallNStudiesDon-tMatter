FIGURE1_REPLICATION_SOURCE_FAMILY_SEEDS:
  schema_version: 0.1.0
  created_from: gpt_coverage_audit_2026_05_02
  purpose: >
    Human/LLM-editable seed list for Figure 1 replication, reproduction,
    robustness, validation, and follow-up source-family discovery. These are
    not accepted corpora/databases. They are named targets for bounded public
    API searches, manual page checks, and source-family inventory.
  admission_note: >
    A named family advances only if it exposes a reusable source object:
    dataset, database, registry, code/data repository, workbook, table, file
    inventory, challenge/venue group, or source-family page. Ordinary
    article-level "replication package" records route to individual-paper or
    repository-package worklists unless they contain multi-row pair evidence.
  source_families:
    - key: replicationwiki
      name: ReplicationWiki
      priority: high
      route: candidate_corpus_database
      aliases:
        - ReplicationWiki
        - ReplicationWiki Transparency in the Social Sciences
        - database of replications in economics
      surfaces: [web, openalex, crossref, semantic_scholar]
      queries:
        - '"ReplicationWiki" "replications" "results"'
        - '"ReplicationWiki" "data and code" "replications"'
        - '"ReplicationWiki" "classified" "replication"'
    - key: institute_for_replication
      name: Institute for Replication
      priority: high
      route: candidate_repository_package
      aliases: [I4R, Institute for Replication, Replication Games, Social Science Reproduction Platform]
      surfaces: [web, openalex, crossref, semantic_scholar, dataverse, zenodo]
      queries:
        - '"Institute for Replication" "Discussion Paper" "robustness reproducibility"'
        - '"Replication Games" "original" "robustness"'
        - '"I4R" "replication" "data" "code"'
    - key: computational_reproducibility_econ_polisci
      name: Computational Reproducibility and Robustness of Empirical Economics and Political Science Research
      priority: high
      route: candidate_repository_package
      aliases: [Brodeur Cook Mikola reproduction project, 110 articles reproducibility robustness]
      surfaces: [web, openalex, crossref, semantic_scholar, zenodo]
      queries:
        - '"Computational Reproducibility and Robustness" "110 articles"'
        - '"Brodeur" "Mikola" "Cook" "replication package"'
        - '"economics and political science" "110 articles" "robustness"'
    - key: brazilian_reproducibility_initiative
      name: Brazilian Reproducibility Initiative
      priority: high
      route: candidate_corpus_database
      aliases: [BRI, Brazilian Reproducibility Initiative, Rede Brasileira de Reprodutibilidade, reprodutibilidade]
      surfaces: [web, osf, dataverse, zenodo, openalex, crossref, europepmc]
      queries:
        - '"Brazilian Reproducibility Initiative" "analysis data"'
        - '"Brazilian Reproducibility Initiative" "OSF"'
        - '"reprodutibilidade" "replicability" "MTT" "RT-PCR"'
    - key: reprosci_fly_immunity
      name: ReproSci Fly Immunity Workspace
      priority: high
